<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔢 2048 - 搜罗天下游戏</title>
    <meta name="description" content="经典2048数字益智游戏，在线免费玩，无限关卡，高分挑战。搜罗天下精选小游戏。">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="games.css">
    <style>
        body { background: #0a0015; min-height: 100vh; }
        .game-container { max-width: 520px; margin: 0 auto; padding: 20px 16px 40px; }
        .game-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding: 14px 18px;
            background: rgba(15,0,35,0.8); border-radius: 14px; border: 1px solid rgba(139,92,246,0.2); }
        .back-btn { font-size: 20px; cursor: pointer; text-decoration: none; }
        .back-btn:hover { transform: scale(1.1); }
        .game-title-wrap h1 { font-size: 20px; color: #fff; margin: 0; font-weight: 700; }
        .game-title-wrap p { font-size: 12px; color: #6b7280; margin: 2px 0 0; }
        .score-bar { display: flex; gap: 12px; margin-bottom: 20px; }
        .score-box { flex: 1; background: rgba(15,0,35,0.8); border: 1px solid rgba(139,92,246,0.25);
            border-radius: 12px; padding: 12px 16px; text-align: center; }
        .score-label { font-size: 11px; color: #a78bfa; text-transform: uppercase; letter-spacing: 1px; }
        .score-num { font-size: 28px; font-weight: 800; color: #fff; line-height: 1.1; }
        .score-num.highlight { color: #f472b6; }
        .board-wrapper { position: relative; margin-bottom: 20px; }
        #board {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            background: rgba(20,0,40,0.9); border-radius: 16px; padding: 10px;
            border: 2px solid rgba(139,92,246,0.3); aspect-ratio: 1;
            user-select: none; touch-action: none;
        }
        .cell {
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: clamp(24px, 7vw, 44px);
            transition: transform 0.08s;
        }
        .c0 { background: rgba(30,20,50,0.6); }
        .c2 { background: linear-gradient(135deg, #f3e8ff, #e9d5ff); color: #6b21a8; }
        .c4 { background: linear-gradient(135deg, #ede9fe, #ddd6fe); color: #7c3aed; }
        .c8 { background: linear-gradient(135deg, #fde68a, #fcd34d); color: #92400e; }
        .c16 { background: linear-gradient(135deg, #fde68a, #fbbf24); color: #78350f; }
        .c32 { background: linear-gradient(135deg, #fca5a5, #f87171); color: #fff; }
        .c64 { background: linear-gradient(135deg, #f87171, #ef4444); color: #fff; }
        .c128 { background: linear-gradient(135deg, #fdba74, #fb923c); color: #fff; font-size: clamp(20px, 6vw, 38px); }
        .c256 { background: linear-gradient(135deg, #fb923c, #f97316); color: #fff; font-size: clamp(20px, 6vw, 38px); }
        .c512 { background: linear-gradient(135deg, #fb7185, #e11d48); color: #fff; font-size: clamp(20px, 6vw, 38px); }
        .c1024 { background: linear-gradient(135deg, #a855f7, #7e22ce); color: #fff; font-size: clamp(16px, 4.5vw, 30px); }
        .c2048 { background: linear-gradient(135deg, #f472b6, #ec4899); color: #fff; font-size: clamp(16px, 4.5vw, 30px);
            box-shadow: 0 0 30px rgba(244,114,182,0.5); }
        .c4096,.c8192 { background: linear-gradient(135deg, #7c3aed, #4c1d95); color: #fff; font-size: clamp(14px, 4vw, 26px); }
        .overlay {
            position: absolute; inset: 10px; border-radius: 12px;
            background: rgba(10,0,25,0.88); display: none; flex-direction: column;
            align-items: center; justify-content: center; gap: 14px; backdrop-filter: blur(4px);
        }
        .overlay.show { display: flex; }
        .overlay-title { font-size: 28px; font-weight: 800; color: #fff; }
        .overlay-title.win { background: linear-gradient(90deg, #f472b6, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .overlay-sub { font-size: 14px; color: #9ca3af; text-align: center; max-width: 200px; }
        .overlay-btn { padding: 12px 28px; border-radius: 12px; font-size: 15px; font-weight: 700;
            cursor: pointer; border: none; font-family: inherit; transition: all .2s; }
        .btn-retry { background: linear-gradient(135deg, #7c3aed, #db2777); color: #fff; }
        .btn-retry:hover { box-shadow: 0 0 20px rgba(139,92,246,0.4); transform: scale(1.05); }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 24px; }
        .ctrl-btn { padding: 10px 20px; border-radius: 10px; border: 1px solid rgba(139,92,246,0.3);
            background: rgba(15,0,35,0.8); color: #a78bfa; font-size: 13px; font-weight: 600;
            cursor: pointer; font-family: inherit; transition: all .2s; }
        .ctrl-btn:hover { border-color: #7c3aed; color: #fff; background: rgba(139,92,246,0.15); }
        .how-to { background: rgba(15,0,35,0.7); border-radius: 12px; padding: 16px;
            border: 1px solid rgba(139,92,246,0.15); margin-bottom: 20px; }
        .how-to h3 { color: #a78bfa; font-size: 14px; margin: 0 0 8px; }
        .how-to p { color: #9ca3af; font-size: 13px; margin: 0; line-height: 1.6; }
        .how-to .key-hint { display: inline-flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
        .key { background: rgba(139,92,246,0.2); color: #c4b5fd; padding: 2px 8px; border-radius: 5px;
            font-size: 12px; border: 1px solid rgba(139,92,246,0.3); }
        .share-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .share-btn { padding: 10px 22px; border-radius: 10px; font-size: 13px; font-weight: 700;
            cursor: pointer; border: none; font-family: inherit; text-decoration: none;
            transition: all .2s; display: inline-flex; align-items: center; gap: 6px; }
        .share-twitter { background: #1d9bf0; color: #fff; }
        .share-copy { background: rgba(139,92,246,0.2); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
        .share-btn:hover { transform: scale(1.05); opacity: .9; }
        .copied-tip { display: none; color: #34d399; font-size: 13px; text-align: center; margin-top: 8px; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-header">
        <a href="games.html" class="back-btn">←</a>
        <div class="game-title-wrap">
            <h1>🔢 2048</h1>
            <p>合并数字 · 挑战2048</p>
        </div>
    </div>
    <div class="score-bar">
        <div class="score-box">
            <div class="score-label">当前分数</div>
            <div class="score-num" id="score">0</div>
        </div>
        <div class="score-box">
            <div class="score-label">历史最高</div>
            <div class="score-num highlight" id="best">0</div>
        </div>
    </div>
    <div class="board-wrapper">
        <div id="board"></div>
        <div class="overlay" id="overlay">
            <div class="overlay-title" id="overlayTitle">游戏结束</div>
            <div class="overlay-sub" id="overlaySub">再接再厉！</div>
            <button class="overlay-btn btn-retry" onclick="resetGame()">🔄 再来一局</button>
        </div>
    </div>
    <div class="controls">
        <button class="ctrl-btn" onclick="resetGame()">🔄 新游戏</button>
        <button class="ctrl-btn" onclick="undoMove()">↩️ 撤销</button>
    </div>
    <div class="how-to">
        <h3>📖 玩法说明</h3>
        <p>滑动合并相同数字，目标是合成 <strong style="color:#f472b6">2048</strong>！</p>
        <div class="key-hint">
            <span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span>
            方向键 或 滑动屏幕
        </div>
    </div>
    <div class="share-row">
        <a class="share-btn share-twitter" id="shareTwitter" href="#" target="_blank">🐦 分享给朋友</a>
        <button class="share-btn share-copy" onclick="copyLink()">📋 复制链接</button>
    </div>
    <p class="copied-tip" id="copiedTip">✅ 链接已复制！</p>
</div>

<script>
const SIZE = 4;
let board, score, best, canMove, undoStack = [];
best = parseInt(localStorage.getItem('g2048_best') || '0');
document.getElementById('best').textContent = best;

function init() {
    board = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
    score = 0;
    canMove = true;
    undoStack = [];
    document.getElementById('score').textContent = '0';
    document.getElementById('overlay').classList.remove('show');
    addRandom();
    addRandom();
    render();
}

function addRandom() {
    let zeros = [];
    for (let r = 0; r < SIZE; r++)
        for (let c = 0; c < SIZE; c++)
            if (board[r][c] === 0) zeros.push([r, c]);
    if (!zeros.length) return;
    let [r, c] = zeros[Math.floor(Math.random() * zeros.length)];
    board[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function render() {
    const el = document.getElementById('board');
    el.innerHTML = '';
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            let v = board[r][c];
            let div = document.createElement('div');
            div.className = 'cell ' + (v >= 8192 ? 'c4096' : 'c' + v);
            div.textContent = v || '';
            el.appendChild(div);
        }
    }
}

function slide(row) {
    let arr = row.filter(x => x);
    let out = [];
    let gained = 0;
    for (let i = 0; i < arr.length; i++) {
        if (i + 1 < arr.length && arr[i] === arr[i+1]) {
            let nv = arr[i] * 2;
            out.push(nv);
            gained += nv;
            i++;
        } else {
            out.push(arr[i]);
        }
    }
    while (out.length < SIZE) out.push(0);
    return { row: out, gained };
}

function move(dir) {
    if (!canMove) return;
    undoStack.push({ board: board.map(r => [...r]), score });
    if (undoStack.length > 10) undoStack.shift();

    let gained = 0;
    let moved = false;

    if (dir === 'left') {
        for (let r = 0; r < SIZE; r++) {
            let { row, gained: g } = slide(board[r]);
            if (row.join() !== board[r].join()) moved = true;
            board[r] = row;
            gained += g;
        }
    } else if (dir === 'right') {
        for (let r = 0; r < SIZE; r++) {
            let rev = [...board[r]].reverse();
            let { row, gained: g } = slide(rev);
            let final = row.reverse();
            if (final.join() !== board[r].join()) moved = true;
            board[r] = final;
            gained += g;
        }
    } else if (dir === 'up') {
        for (let c = 0; c < SIZE; c++) {
            let col = [];
            for (let r = 0; r < SIZE; r++) col.push(board[r][c]);
            let { row, gained: g } = slide(col);
            for (let r = 0; r < SIZE; r++) {
                if (board[r][c] !== row[r]) moved = true;
                board[r][c] = row[r];
            }
            gained += g;
        }
    } else if (dir === 'down') {
        for (let c = 0; c < SIZE; c++) {
            let col = [];
            for (let r = 0; r < SIZE; r++) col.push(board[r][c]);
            let { row, gained: g } = slide([...col].reverse());
            let final = row.reverse();
            for (let r = 0; r < SIZE; r++) {
                if (board[r][c] !== final[r]) moved = true;
                board[r][c] = final[r];
            }
            gained += g;
        }
    }

    if (moved) {
        score += gained;
        document.getElementById('score').textContent = score;
        if (score > best) {
            best = score;
            localStorage.setItem('g2048_best', best);
            document.getElementById('best').textContent = best;
        }
        addRandom();
        render();
        checkGame();
        updateShare();
    } else {
        undoStack.pop(); // no move, remove undo record
    }
}

function undoMove() {
    if (!undoStack.length) return;
    let prev = undoStack.pop();
    board = prev.board;
    score = prev.score;
    document.getElementById('score').textContent = score;
    canMove = true;
    document.getElementById('overlay').classList.remove('show');
    render();
}

function checkGame() {
    let won = false;
    for (let r = 0; r < SIZE; r++)
        for (let c = 0; c < SIZE; c++)
            if (board[r][c] === 2048) won = true;

    if (won) {
        canMove = false;
        document.getElementById('overlayTitle').textContent = '🎉 2048达成！';
        document.getElementById('overlayTitle').classList.add('win');
        document.getElementById('overlaySub').textContent = '太厉害了！继续挑战更高分！';
        document.getElementById('overlay').classList.add('show');
        return;
    }

    for (let r = 0; r < SIZE; r++)
        for (let c = 0; c < SIZE; c++) {
            if (board[r][c] === 0) return;
            if (c < SIZE-1 && board[r][c] === board[r][c+1]) return;
            if (r < SIZE-1 && board[r][c] === board[r+1][c]) return;
        }
    canMove = false;
    document.getElementById('overlayTitle').textContent = '💔 游戏结束';
    document.getElementById('overlayTitle').classList.remove('win');
    document.getElementById('overlaySub').textContent = '分数 ' + score + '，再挑战一次吧！';
    document.getElementById('overlay').classList.add('show');
}

function resetGame() { init(); }

function updateShare() {
    let url = encodeURIComponent(window.location.href);
    let text = encodeURIComponent('我在搜罗天下玩2048，分数 ' + score + '！');
    document.getElementById('shareTwitter').href = 'https://twitter.com/intent/tweet?text=' + text + '&url=' + url;
}
function copyLink() {
    navigator.clipboard.writeText(window.location.href).then(() => {
        document.getElementById('copiedTip').style.display = 'block';
        setTimeout(() => document.getElementById('copiedTip').style.display = 'none', 2500);
    });
}

document.addEventListener('keydown', e => {
    const map = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down' };
    if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

let touchStartX, touchStartY;
const boardEl = document.getElementById('board');
boardEl.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }, {passive:true});
boardEl.addEventListener('touchend', e => {
    if (!touchStartX) return;
    let dx = e.changedTouches[0].clientX - touchStartX;
    let dy = e.changedTouches[0].clientY - touchStartY;
    let adx = Math.abs(dx), ady = Math.abs(dy);
    if (Math.max(adx, ady) < 30) return;
    if (adx > ady) move(dx > 0 ? 'right' : 'left');
    else move(dy > 0 ? 'down' : 'up');
}, {passive:true});

init();
updateShare();
</script>
</body>
</html>
