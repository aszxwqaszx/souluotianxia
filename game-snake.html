<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 贪吃蛇 - 搜罗天下游戏</title>
    <meta name="description" content="经典贪吃蛇游戏在线玩，无限模式，挑战最高分。搜罗天下精选免费小游戏。">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="games.css">
    <style>
        body { background: #0a0015; min-height: 100vh; }
        .game-container { max-width: 520px; margin: 0 auto; padding: 20px 16px 40px; }
        .game-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding: 14px 18px;
            background: rgba(15,0,35,0.8); border-radius: 14px; border: 1px solid rgba(139,92,246,0.2); }
        .back-btn { font-size: 20px; cursor: pointer; text-decoration: none; }
        .game-title-wrap h1 { font-size: 20px; color: #fff; margin: 0; font-weight: 700; }
        .game-title-wrap p { font-size: 12px; color: #6b7280; margin: 2px 0 0; }
        .score-bar { display: flex; gap: 12px; margin-bottom: 16px; }
        .score-box { flex: 1; background: rgba(15,0,35,0.8); border: 1px solid rgba(139,92,246,0.25);
            border-radius: 12px; padding: 12px 16px; text-align: center; }
        .score-label { font-size: 11px; color: #a78bfa; text-transform: uppercase; letter-spacing: 1px; }
        .score-num { font-size: 28px; font-weight: 800; color: #fff; line-height: 1.1; }
        .score-num.highlight { color: #f472b6; }

        /* Canvas */
        #gameCanvas {
            display: block; width: 100%; border-radius: 14px;
            border: 2px solid rgba(139,92,246,0.3);
            background: #0d0020; margin-bottom: 16px;
            touch-action: none;
        }

        /* State overlay */
        .state-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            background: rgba(10,0,25,0.92); border-radius: 16px; padding: 30px 40px;
            text-align: center; border: 2px solid rgba(139,92,246,0.4);
            backdrop-filter: blur(8px); z-index: 10;
        }
        .state-overlay.hidden { display: none; }
        .state-overlay h2 { color: #fff; font-size: 24px; margin: 0 0 8px; }
        .state-overlay p { color: #9ca3af; font-size: 14px; margin: 0 0 20px; }
        .start-btn {
            padding: 14px 36px; border-radius: 12px; font-size: 16px; font-weight: 700;
            background: linear-gradient(135deg, #7c3aed, #db2777); color: #fff;
            border: none; cursor: pointer; font-family: inherit; transition: all .2s;
        }
        .start-btn:hover { box-shadow: 0 0 25px rgba(139,92,246,0.4); transform: scale(1.05); }

        .canvas-wrap { position: relative; }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; }
        .ctrl-btn { padding: 10px 20px; border-radius: 10px; border: 1px solid rgba(139,92,246,0.3);
            background: rgba(15,0,35,0.8); color: #a78bfa; font-size: 13px; font-weight: 600;
            cursor: pointer; font-family: inherit; transition: all .2s; }
        .ctrl-btn:hover { border-color: #7c3aed; color: #fff; background: rgba(139,92,246,0.15); }

        .how-to { background: rgba(15,0,35,0.7); border-radius: 12px; padding: 16px;
            border: 1px solid rgba(139,92,246,0.15); margin-bottom: 20px; }
        .how-to h3 { color: #a78bfa; font-size: 14px; margin: 0 0 8px; }
        .how-to p { color: #9ca3af; font-size: 13px; margin: 0; line-height: 1.6; }

        /* D-pad for mobile */
        .dpad { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 6px; max-width: 180px; margin: 0 auto 16px; }
        .dpad-btn { width: 54px; height: 54px; border-radius: 12px; border: 2px solid rgba(139,92,246,0.35);
            background: rgba(15,0,35,0.9); color: #a78bfa; font-size: 22px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all .15s;
            user-select: none; -webkit-user-select: none; }
        .dpad-btn:active { background: rgba(139,92,246,0.3); transform: scale(0.92); }
        .dpad-up { grid-area: up; }
        .dpad-left { grid-area: left; }
        .dpad-right { grid-area: right; }
        .dpad-down { grid-area: down; }
        .dpad-center { grid-area: center; display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: #6b7280; }
    </style>
</head>
<body>

<div class="game-container">

    <div class="game-header">
        <a href="games.html" class="back-btn">←</a>
        <div class="game-title-wrap">
            <h1>🐍 贪吃蛇</h1>
            <p>经典怀旧 · 挑战最高分</p>
        </div>
    </div>

    <div class="score-bar">
        <div class="score-box">
            <div class="score-label">当前分数</div>
            <div class="score-num" id="score">0</div>
        </div>
        <div class="score-box">
            <div class="score-label">历史最高</div>
            <div class="score-num highlight" id="best">0</div>
        </div>
    </div>

    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="440" height="440"></canvas>
        <div class="state-overlay" id="startOverlay">
            <h2>🐍 贪吃蛇</h2>
            <p>吃食物让蛇变长，别撞墙别咬到自己！</p>
            <button class="start-btn" onclick="startGame()">▶️ 开始游戏</button>
        </div>
        <div class="state-overlay hidden" id="gameOverOverlay">
            <h2>💔 游戏结束</h2>
            <p id="gameOverMsg">得分 0 分，加油！</p>
            <button class="start-btn" onclick="startGame()">🔄 再来一局</button>
        </div>
    </div>

    <div class="dpad">
        <button class="dpad-btn dpad-up" ontouchstart="setDir('up')" onclick="setDir('up')">↑</button>
        <button class="dpad-btn dpad-left" ontouchstart="setDir('left')" onclick="setDir('left')">←</button>
        <div class="dpad-center">操作</div>
        <button class="dpad-btn dpad-right" ontouchstart="setDir('right')" onclick="setDir('right')">→</button>
        <button class="dpad-btn dpad-down" ontouchstart="setDir('down')" onclick="setDir('down')">↓</button>
    </div>

    <div class="controls">
        <button class="ctrl-btn" onclick="startGame()">🔄 重开</button>
        <button class="ctrl-btn" id="pauseBtn" onclick="togglePause()">⏸️ 暂停</button>
    </div>

    <div class="how-to">
        <h3>📖 玩法说明</h3>
        <p>用方向键↑↓←→或下方按钮控制蛇移动方向。吃掉食物让蛇变长，得分更高。别撞墙，别咬到自己！</p>
    </div>

</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const GRID = 20;
const CELL = canvas.width / GRID;
let snake, dir, food, score, interval, best;
let gameState = 'idle'; // idle, playing, paused, over
best = parseInt(localStorage.getItem('gSnake_best') || '0');
document.getElementById('best').textContent = best;

function startGame() {
    snake = [{x: 10, y: 10}];
    dir = {x: 1, y: 0};
    score = 0;
    document.getElementById('score').textContent = 0;
    spawnFood();
    gameState = 'playing';
    document.getElementById('startOverlay').classList.add('hidden');
    document.getElementById('gameOverOverlay').classList.add('hidden');
    document.getElementById('pauseBtn').textContent = '⏸️ 暂停';
    if (interval) clearInterval(interval);
    interval = setInterval(update, 120);
    draw();
}

function spawnFood() {
    do {
        food = {x: Math.floor(Math.random()*GRID), y: Math.floor(Math.random()*GRID)};
    } while (snake.some(s => s.x === food.x && s.y === food.y));
}

function update() {
    if (gameState !== 'playing') return;
    let head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
    // 穿墙
    head.x = (head.x + GRID) % GRID;
    head.y = (head.y + GRID) % GRID;
    // 撞自己
    if (snake.some(s => s.x === head.x && s.y === head.y)) { gameOver(); return; }
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
        score += 10;
        document.getElementById('score').textContent = score;
        if (score > best) {
            best = score;
            localStorage.setItem('gSnake_best', best);
            document.getElementById('best').textContent = best;
        }
        spawnFood();
    } else {
        snake.pop();
    }
    draw();
}

function draw() {
    ctx.fillStyle = '#0d0020';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // Grid
    ctx.strokeStyle = 'rgba(139,92,246,0.07)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= GRID; i++) {
        ctx.beginPath(); ctx.moveTo(i*CELL, 0); ctx.lineTo(i*CELL, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i*CELL); ctx.lineTo(canvas.width, i*CELL); ctx.stroke();
    }
    // Food (glow)
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#ef4444';
    ctx.fillStyle = '#ef4444';
    ctx.beginPath();
    ctx.arc(food.x*CELL + CELL/2, food.y*CELL + CELL/2, CELL/2 - 2, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    // Snake body
    snake.forEach((seg, i) => {
        let isHead = i === 0;
        let ratio = 1 - i / snake.length * 0.4;
        let g = ctx.createLinearGradient(seg.x*CELL, seg.y*CELL, seg.x*CELL+CELL, seg.y*CELL+CELL);
        if (isHead) {
            g.addColorStop(0, '#a78bfa');
            g.addColorStop(1, '#7c3aed');
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#a78bfa';
        } else {
            g.addColorStop(0, `rgba(139,92,246,${ratio})`);
            g.addColorStop(1, `rgba(109,40,217,${ratio})`);
        }
        ctx.fillStyle = g;
        let pad = isHead ? 1 : 2;
        ctx.beginPath();
        ctx.roundRect(seg.x*CELL+pad, seg.y*CELL+pad, CELL-pad*2, CELL-pad*2, isHead ? 5 : 3);
        ctx.fill();
        ctx.shadowBlur = 0;
        // Eyes on head
        if (isHead) {
            ctx.fillStyle = '#fff';
            let ex = seg.x*CELL+CELL*0.3, ey = seg.y*CELL+CELL*0.3;
            let ex2 = seg.x*CELL+CELL*0.7, ey2 = seg.y*CELL+CELL*0.3;
            if (dir.y === 1) { ey = seg.y*CELL+CELL*0.7; ey2 = seg.y*CELL+CELL*0.7; ex = seg.x*CELL+CELL*0.3; ex2 = seg.x*CELL+CELL*0.7; }
            if (dir.x === 0) { [ex,ey]=[seg.x*CELL+CELL*0.3,seg.y*CELL+CELL*0.3]; [ex2,ey2]=[seg.x*CELL+CELL*0.7,seg.y*CELL+CELL*0.3]; }
            ctx.beginPath(); ctx.arc(ex, ey, 2.5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(ex2, ey2, 2.5, 0, Math.PI*2); ctx.fill();
        }
    });
}

function gameOver() {
    gameState = 'over';
    clearInterval(interval);
    document.getElementById('gameOverMsg').textContent = '得分 ' + score + ' 分，加油！';
    document.getElementById('gameOverOverlay').classList.remove('hidden');
}

function setDirection(newDir) {
    if (gameState !== 'playing') return;
    if (newDir === 'up' && dir.y === 1) return;
    if (newDir === 'down' && dir.y === -1) return;
    if (newDir === 'left' && dir.x === 1) return;
    if (newDir === 'right' && dir.x === -1) return;
    if (newDir === 'up') dir = {x:0, y:-1};
    else if (newDir === 'down') dir = {x:0, y:1};
    else if (newDir === 'left') dir = {x:-1, y:0};
    else if (newDir === 'right') dir = {x:1, y:0};
}
window.setDir = setDirection;

function togglePause() {
    if (gameState === 'playing') {
        gameState = 'paused';
        clearInterval(interval);
        document.getElementById('pauseBtn').textContent = '▶️ 继续';
    } else if (gameState === 'paused') {
        gameState = 'playing';
        interval = setInterval(update, 120);
        document.getElementById('pauseBtn').textContent = '⏸️ 暂停';
    }
}

// Keyboard
document.addEventListener('keydown', e => {
    const map = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right',
        w:'up', s:'down', a:'left', d:'right' };
    if (map[e.key]) { e.preventDefault(); setDir(map[e.key]); }
});

// Touch swipe
let tx, ty;
canvas.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive:true});
canvas.addEventListener('touchend', e => {
    if (!tx) return;
    let dx = e.changedTouches[0].clientX - tx;
    let dy = e.changedTouches[0].clientY - ty;
    if (Math.max(Math.abs(dx),Math.abs(dy)) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx>0?'right':'left');
    else setDir(dy>0?'down':'up');
}, {passive:true});

draw();
</script>
</body>
</html>
