<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>优惠折扣 - 搜罗天下</title>
    <meta name="description" content="汇集全网最新优惠券、折扣信息，帮你省钱每一天。">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="header">
        <div class="container header-inner">
            <a href="index.html" class="logo">
                <span class="logo-icon">🦞</span>
                <span class="logo-text">搜罗天下</span>
            </a>
            <nav class="nav">
                <a href="index.html" class="nav-link">首页</a>
                <a href="deals.html" class="nav-link active">优惠折扣</a>
                <a href="#" class="nav-link disabled">AI工具 <span class="soon">筹备中</span></a>
                <a href="#" class="nav-link disabled">实用工具 <span class="soon">筹备中</span></a>
                <a href="#" class="nav-link disabled">资源下载 <span class="soon">筹备中</span></a>
                <a href="about.html" class="nav-link">关于我们</a>
            </nav>
        </div>
    </header>

    <div class="page-header">
        <div class="container">
            <h1>🎁 优惠折扣</h1>
            <p>汇集全网最新优惠券、折扣信息，购物前先来看看</p>
        </div>
    </div>

    <section class="section">
        <div class="container">
            <div class="deal-list" id="allDeals">
                <div class="deal-loading">正在加载...</div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="index.html">首页</a>
                <a href="deals.html">优惠折扣</a>
                <a href="about.html">关于我们</a>
                <a href="about.html#disclaimer">免责申明</a>
            </div>
            <p class="footer-text">© 2026 搜罗天下</p>
            <p class="footer-disclaimer">本网站仅收录公开优惠信息，购买前请仔细核对。</p>
        </div>
    </footer>

    <script>
    async function loadDeals() {
        const container = document.getElementById('allDeals');
        try {
            const res = await fetch('deals.json');
            const data = await res.json();
            if (data.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#999;padding:40px 0;">暂无优惠信息，敬请期待！</p>';
                return;
            }
            container.innerHTML = data.map(item => `
                <div class="deal-item">
                    <div class="deal-platform">${item.platform}</div>
                    <div class="deal-content">
                        <h4 class="deal-title">${item.title}</h4>
                        <p class="deal-desc">${item.desc}</p>
                        <div class="deal-meta">
                            <span class="deal-tag ${item.type}">${item.typeText}</span>
                            <span class="deal-date">${item.date}</span>
                        </div>
                    </div>
                    <a href="${item.link}" target="_blank" class="deal-btn">立即领取</a>
                </div>
            `).join('');
        } catch(e) {
            container.innerHTML = '<p style="text-align:center;color:#999;padding:40px 0;">暂无优惠信息，敬请期待！</p>';
        }
    }
    loadDeals();
    </script>

</body>
</html>
