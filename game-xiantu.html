<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仙途 - 简约修仙打宝RPG</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: #0a0a0f; 
  color: #e0e0e0; 
  font-family: 'Microsoft YaHei', sans-serif;
  overflow: hidden;
  user-select: none;
}
#game-container {
  position: relative;
  width: 100vw;
  height: 100vh;
  display: flex;
}
#game-canvas {
  flex: 1;
  background: linear-gradient(180deg, #0d1117 0%, #161b22 100%);
}
/* 右侧面板 */
#side-panel {
  width: 280px;
  background: #0d1117;
  border-left: 1px solid #30363d;
  display: flex;
  flex-direction: column;
  font-size: 13px;
}
.panel-section {
  padding: 12px;
  border-bottom: 1px solid #30363d;
}
.panel-title {
  color: #58a6ff;
  font-size: 12px;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
/* 角色状态 */
#player-name { font-size: 16px; font-weight: bold; color: #f0f6fc; }
#player-realm { color: #ffa500; font-size: 12px; }
.stat-row {
  display: flex;
  justify-content: space-between;
  margin: 4px 0;
}
.stat-bar {
  height: 6px;
  background: #21262d;
  border-radius: 3px;
  margin-top: 2px;
  overflow: hidden;
}
.stat-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s;
}
.hp-fill { background: linear-gradient(90deg, #da3633, #f85149); }
.mp-fill { background: linear-gradient(90deg, #1f6feb, #58a6ff); }
.exp-fill { background: linear-gradient(90deg, #238636, #3fb950); }
/* 装备槽 */
.equip-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
}
.equip-slot {
  aspect-ratio: 1;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  cursor: pointer;
  position: relative;
}
.equip-slot:hover { border-color: #58a6ff; }
.equip-slot.quality-green { border-color: #3fb950; }
.equip-slot.quality-blue { border-color: #58a6ff; }
.equip-slot.quality-purple { border-color: #a371f7; }
.equip-slot.quality-orange { border-color: #d29922; }
.equip-slot.quality-red { border-color: #f85149; }
/* 技能栏 */
.skill-bar {
  display: flex;
  gap: 6px;
}
.skill-slot {
  width: 44px;
  height: 44px;
  background: #161b22;
  border: 2px solid #30363d;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  cursor: pointer;
  position: relative;
}
.skill-slot:hover { border-color: #58a6ff; }
.skill-slot.on-cooldown {
  opacity: 0.5;
}
.skill-slot .cooldown-overlay {
  position: absolute;
  bottom: 2px;
  right: 2px;
  font-size: 10px;
  color: #f85149;
}
.skill-key {
  position: absolute;
  top: 2px;
  left: 2px;
  font-size: 10px;
  color: #8b949e;
}
/* 背包 */
#inventory-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 3px;
  max-height: 200px;
  overflow-y: auto;
}
.inv-slot {
  aspect-ratio: 1;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  cursor: pointer;
  position: relative;
}
.inv-slot:hover { border-color: #58a6ff; }
.inv-slot .item-count {
  position: absolute;
  bottom: 1px;
  right: 2px;
  font-size: 10px;
  color: #f0f6fc;
}
/* 日志 */
#combat-log {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px;
  font-size: 11px;
  line-height: 1.6;
}
.log-item { margin: 2px 0; }
.log-damage { color: #f85149; }
.log-heal { color: #3fb950; }
.log-drop { color: #ffa657; }
.log-exp { color: #a371f7; }
.log-level { color: #f0f6fc; font-weight: bold; }
/* 掉落弹窗 */
#drop-modal {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #0d1117;
  border: 2px solid #30363d;
  border-radius: 12px;
  padding: 20px;
  min-width: 300px;
  display: none;
  z-index: 100;
  text-align: center;
}
#drop-modal.show { display: block; }
#drop-modal h3 { color: #ffa657; margin-bottom: 12px; }
#drop-items { margin: 12px 0; }
.drop-item {
  padding: 8px;
  margin: 4px 0;
  background: #161b22;
  border-radius: 6px;
}
#drop-modal button {
  margin-top: 12px;
  padding: 8px 24px;
  background: #238636;
  border: none;
  border-radius: 6px;
  color: #fff;
  cursor: pointer;
}
/* 底部状态栏 */
#bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 280px;
  height: 40px;
  background: #161b22;
  border-top: 1px solid #30363d;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 20px;
  font-size: 12px;
}
#bottom-bar .coord { color: #8b949e; }
#bottom-bar .gold { color: #ffa657; }
#bottom-bar .kills { color: #f85149; }
/* 暂停/设置按钮 */
#top-controls {
  position: fixed;
  top: 10px;
  left: 10px;
  display: flex;
  gap: 8px;
  z-index: 50;
}
.ctrl-btn {
  width: 36px;
  height: 36px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 6px;
  color: #8b949e;
  cursor: pointer;
  font-size: 16px;
}
.ctrl-btn:hover { border-color: #58a6ff; color: #f0f6fc; }
/* 怪物血条 */
.mob-hp-bar {
  position: absolute;
  width: 50px;
  height: 4px;
  background: #21262d;
  border-radius: 2px;
  transform: translateX(-50%);
}
.mob-hp-fill {
  height: 100%;
  background: #f85149;
  border-radius: 2px;
}
.mob-name {
  position: absolute;
  font-size: 10px;
  color: #f0f6fc;
  white-space: nowrap;
  transform: translateX(-50%);
}
/* 伤害数字 */
.damage-number {
  position: absolute;
  font-weight: bold;
  font-size: 14px;
  pointer-events: none;
  animation: floatUp 0.8s ease-out forwards;
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-30px); }
}
.dmg-player { color: #f85149; }
.dmg-mob { color: #ffa657; }
.dmg-crit { color: #f0f6fc; font-size: 18px; }
.dmg-heal { color: #3fb950; }
</style>
</head>

  },

// Realm helpers
function getRealm(level) {
  for (let i = REALMS.length - 1; i >= 0; i--) {
    if (level >= REALMS[i].minLv) return REALMS[i];
  }
  return REALMS[0];
}
function getRealmName(level) {
  const r = getRealm(level);
  const inner = level - r.minLv + 1;
  return r.name + inner + '层 / ' + (r.maxLv - r.minLv + 1);
}
function checkRealmBreakthrough(oldLevel, newLevel) {
  const oldRealm = getRealm(oldLevel);
  const newRealm = getRealm(newLevel);
  if (newRealm.name !== oldRealm.name) {
    log('突破! 进入' + newRealm.name + '!', 'level');
    saveGame(true);
  }
}
function expToLevel(level) {
  if (level <= 10) return 50 + level * 15;
  if (level <= 20) return 350 + (level - 10) * 40;
  if (level <= 30) return 1150 + (level - 20) * 85;
  if (level <= 40) return 2200 + (level - 30) * 160;
  if (level <= 50) return 4200 + (level - 40) * 280;
  return 7600 + (level - 50) * 500;
}

// UI log
function log(msg, type) {
  const el = document.getElementById('game-log');
  if (!el) return;
  const colors = { info: '#58a6ff', damage: '#f85149', level: '#f0c040', skill: '#a371f7', info2: '#3fb950' };
  const color = colors[type] || '#e0e0e0';
  const div = document.createElement('div');
  div.style.color = color;
  div.textContent = msg;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
  while (el.children.length > 50) el.removeChild(el.firstChild);
}

// Canvas resize
function resizeCanvas() {
  const canvas = document.getElementById('game-canvas');
  if (!canvas) return;
  canvas.width = window.innerWidth - 280;
  canvas.height = window.innerHeight;
  gameState.player.x = canvas.width / 2;
  gameState.player.y = canvas.height / 2;
  rebuildDecorations();
}

// Equipment
function generateEquip(type, qualityIndex, level) {
  const quality = QUALITIES[qualityIndex];
  const equipType = EQUIP_TYPES[type];
  if (!quality || !equipType) return null;
  const nameIndex = Math.min(Math.floor(level / 15), EQUIP_NAMES[type].length - 1);
  const baseAtk = Math.floor(equipType.baseAtk * quality.mult * (1 + level * 0.1));
  const baseDef = Math.floor(equipType.baseDef * quality.mult * (1 + level * 0.1));
  const affixCount = Math.min(qualityIndex, 3);
  const affixes = [];
  for (let i = 0; i < affixCount; i++) {
    const affix = AFFIXES[rand(0, AFFIXES.length - 1)];
    affixes.push({ name: affix.name, stat: affix.stat, value: rand(affix.min, affix.max) * (qualityIndex + 1) });
  }
  return { id: Date.now() + Math.random(), type, name: EQUIP_NAMES[type][nameIndex], quality: qualityIndex, level, atk: baseAtk, def: baseDef, affixes, icon: equipType.icon };
}

// Drop processing
function processDrop(mob, mobType) {
  const drops = [];
  const monster = MONSTERS[mobType];
  if (!monster || !monster.dropTable) return drops;
  
  const counterKey = mobType;
  gameState.player.guaranteeCounters[counterKey] = (gameState.player.guaranteeCounters[counterKey] || 0) + 1;
  
  // Guarantee drop
  if (monster.guarantee && gameState.player.guaranteeCounters[counterKey] >= monster.guarantee.kills) {
    const reward = monster.guarantee.reward;
    if (reward.type === 'equip') {
      const types = Object.keys(EQUIP_TYPES);
      drops.push(generateEquip(types[rand(0, types.length - 1)], reward.quality, reward.level));
    }
    gameState.player.guaranteeCounters[counterKey] = 0;
  }
  
  // Normal drops - 兼容rate和chance
  for (const entry of monster.dropTable) {
    const chance = entry.chance || entry.rate || 0;
    if (Math.random() < chance) {
      if (entry.type === 'equip') {
        const lvRange = entry.levelRange || [1, 10];
        const lv = rand(lvRange[0], lvRange[1]);
        const qRange = entry.qualityRange || [0, 2];
        const q = rand(qRange[0], qRange[1]);
        const types = Object.keys(EQUIP_TYPES);
        const equipType = entry.equipType || types[rand(0, types.length - 1)];
        drops.push(generateEquip(equipType, q, lv));
      } else if (entry.type === 'gold') {
        drops.push({ id: Date.now(), type: 'gold', name: '金币', value: entry.value, icon: '\u2696\ufe0f' });
      } else if (entry.type === 'exp') {
        gameState.player.exp += entry.value;
        drops.push({ id: Date.now(), type: 'exp', name: '经验', value: entry.value, icon: '\u2605' });
      }
    }
  }
  return drops;
}

// Mob spawning
function spawnMob() {
  const lv = gameState.player.level;
  const allTypes = Object.keys(MONSTERS);
  // Prefer matching level monsters
  const matching = allTypes.filter(t => {
    const m = MONSTERS[t];
    return m.dropTable && m.dropTable.some(d => d.type === 'equip' && d.levelRange && lv >= d.levelRange[0] - 3 && lv <= d.levelRange[1] + 5);
  });
  let candidates = matching.length > 0 ? matching : allTypes;
  const type = candidates[rand(0, candidates.length - 1)];
  const base = MONSTERS[type];
  if (!base) return;
  
  const scale = 1 + (lv - 1) * 0.08;
  const mob = {
    ...base,
    type,
    x: 0, y: 0,
    id: Date.now() + Math.random(),
    hp: Math.floor(base.hp * scale),
    maxHp: Math.floor(base.hp * scale),
    atk: Math.floor(base.atk * scale),
    def: Math.floor(base.def * scale),
    exp: Math.floor(base.exp * scale),
    targetX: 0, targetY: 0,
  };
  
  // Spawn around player
  const angle = Math.random() * Math.PI * 2;
  const dist = 150 + Math.random() * 250;
  mob.x = gameState.player.x + Math.cos(angle) * dist;
  mob.y = gameState.player.y + Math.sin(angle) * dist;
  mob.targetX = mob.x;
  mob.targetY = mob.y;
  
  gameState.mobs.push(mob);
}

// Collision
function resolveCollisions() {
  const entities = [
    { x: gameState.player.x, y: gameState.player.y, r: 28, isPlayer: true }
  ];
  for (const m of gameState.mobs) entities.push({ x: m.x, y: m.y, r: m.isBoss ? 40 : 25, mob: m });
  
  for (let i = 0; i < entities.length; i++) {
    for (let j = i + 1; j < entities.length; j++) {
      const a = entities[i], b = entities[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d > 0 && d < a.r + b.r) {
        const overlap = (a.r + b.r - d) / 2;
        const px = dx / d * overlap, py = dy / d * overlap;
        if (a.isPlayer) { gameState.player.x -= px; gameState.player.y -= py; }
        else if (a.mob) { a.mob.x -= px; a.mob.y -= py; }
        if (b.isPlayer) { gameState.player.x += px; gameState.player.y += py; }
        else if (b.mob) { b.mob.x += px; b.mob.y += py; }
      }
    }
  }
}

// Update
function update(dt) {
  if (gameState.paused) return;
  const p = gameState.player;
  const speed = 3;
  if (gameState.keys['w'] || gameState.keys['ArrowUp']) p.y -= speed;
  if (gameState.keys['s'] || gameState.keys['ArrowDown']) p.y += speed;
  if (gameState.keys['a'] || gameState.keys['ArrowLeft']) p.x -= speed;
  if (gameState.keys['d'] || gameState.keys['ArrowRight']) p.x += speed;
  
  // Keep player in bounds
  const canvas = document.getElementById('game-canvas');
  if (canvas) {
    p.x = Math.max(20, Math.min(canvas.width - 20, p.x));
    p.y = Math.max(20, Math.min(canvas.height - 20, p.y));
  }
  
  // Update mobs
  for (const mob of gameState.mobs) {
    const dx = p.x - mob.x, dy = p.y - mob.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d > 50) {
      mob.x += (dx / d) * 1.5;
      mob.y += (dy / d) * 1.5;
    }
  }
  
  // Mouse attack
  if (gameState.mouse.down) {
    const now = Date.now();
    if (now - gameState.lastAttackTime > 300) {
      gameState.lastAttackTime = now;
      const mx = gameState.mouse.x, my = gameState.mouse.y;
      const atk = p.baseAtk;
      for (const mob of gameState.mobs) {
        if (distance(mx, my, mob.x, mob.y) < 60) {
          const dmg = Math.max(1, Math.floor(atk * (1 - mob.def / 200)));
          mob.hp -= dmg;
          gameState.damageNumbers.push({ text: '-' + dmg, x: mob.x, y: mob.y - 30, color: '#f85149', life: 40, crit: false });
          gameState.particles.push({ x: mob.x, y: mob.y, vx: randFloat(-2, 2), vy: randFloat(-2, 2), color: '#f85149', size: rand(2, 4), life: 20, maxLife: 20 });
          if (mob.hp <= 0) onMobDeath(mob);
        }
      }
    }
  }
  
  // Cooldowns
  for (let i = 0; i < p.skillCooldowns.length; i++) {
    if (p.skillCooldowns[i] > 0) p.skillCooldowns[i] -= dt;
  }
  
  // Particles
  gameState.particles = gameState.particles.filter(pt => {
    pt.x += pt.vx; pt.y += pt.vy; pt.life--;
    return pt.life > 0;
  });
  gameState.damageNumbers = gameState.damageNumbers.filter(dn => { dn.y -= 0.5; dn.life--; return dn.life > 0; });
  
  resolveCollisions();
  updateUI();
}

// Mob death
function onMobDeath(mob) {
  const idx = gameState.mobs.indexOf(mob);
  if (idx >= 0) gameState.mobs.splice(idx, 1);
  const drops = processDrop(mob, mob.type);
  if (drops.length > 0) showDropModal(drops);
  const exp = mob.exp;
  if (exp) {
    const oldLevel = gameState.player.level;
    gameState.player.exp += exp;
    const newLevel = gameState.player.level;
    checkRealmBreakthrough(oldLevel, newLevel);
  }
  gameState.player.kills++;
  saveGame(false);
}

// Render
function render() {
  const canvas = document.getElementById('game-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Background
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Decorations
  for (const r of decorations.rivers) {
    ctx.fillStyle = 'rgba(100,149,237,0.3)';
    ctx.beginPath();
    ctx.ellipse(r.x, r.y, r.rx, r.ry, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  for (const f of decorations.farms) {
    ctx.fillStyle = '#3d5c3d';
    ctx.fillRect(f.x, f.y, f.w || 80, f.h || 40);
  }
  for (const m of decorations.mountains) {
    ctx.fillStyle = '#2d2d44';
    ctx.beginPath();
    ctx.moveTo(m.x, m.y + m.h);
    ctx.lineTo(m.x + m.w / 2, m.y);
    ctx.lineTo(m.x + m.w, m.y + m.h);
    ctx.fill();
  }
  for (const t of decorations.trees) {
    ctx.fillStyle = '#1a4a1a';
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.size || 15, 0, Math.PI * 2);
    ctx.fill();
  }
  for (const g of decorations.grass) {
    ctx.fillStyle = 'rgba(50,100,50,0.4)';
    ctx.fillRect(g.x, g.y, 3, g.size || 8);
  }
  
  // Mobs
  for (const mob of gameState.mobs) {
    // Body
    ctx.fillStyle = mob.isBoss ? '#ff6600' : '#8b0000';
    ctx.beginPath();
    ctx.arc(mob.x, mob.y, mob.isBoss ? 22 : 16, 0, Math.PI * 2);
    ctx.fill();
    // HP bar
    const bw = 30, bh = 4;
    ctx.fillStyle = '#333';
    ctx.fillRect(mob.x - bw/2, mob.y - 22, bw, bh);
    ctx.fillStyle = '#f85149';
    ctx.fillRect(mob.x - bw/2, mob.y - 22, bw * (mob.hp / mob.maxHp), bh);
    // Name
    ctx.fillStyle = '#fff';
    ctx.font = '10px Microsoft YaHei';
    ctx.textAlign = 'center';
    ctx.fillText(mob.name, mob.x, mob.y + 28);
  }
  
  // Particles
  for (const pt of gameState.particles) {
    const alpha = pt.life / pt.maxLife;
    ctx.fillStyle = pt.color + Math.floor(alpha * 255).toString(16).padStart(2, '0');
    ctx.fillRect(pt.x, pt.y, pt.size, pt.size);
  }
  
  // Player - 修士形象
  const p = gameState.player;
  const px = p.x, py = p.y;
  
  // 身体（道袍）
  ctx.fillStyle = '#4a5568';
  ctx.beginPath();
  ctx.moveTo(px - 12, py + 5);
  ctx.lineTo(px - 8, py + 25);
  ctx.lineTo(px + 8, py + 25);
  ctx.lineTo(px + 12, py + 5);
  ctx.closePath();
  ctx.fill();
  
  // 头
  ctx.fillStyle = '#fcd5b8';
  ctx.beginPath();
  ctx.arc(px, py - 8, 10, 0, Math.PI * 2);
  ctx.fill();
  
  // 发髻
  ctx.fillStyle = '#2d3748';
  ctx.beginPath();
  ctx.arc(px, py - 16, 5, 0, Math.PI * 2);
  ctx.fill();
  
  // 眼睛
  ctx.fillStyle = '#1a202c';
  ctx.fillRect(px - 5, py - 9, 3, 3);
  ctx.fillRect(px + 2, py - 9, 3, 3);
  
  // 剑（右手）
  ctx.strokeStyle = '#a0aec0';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(px + 14, py - 5);
  ctx.lineTo(px + 25, py - 20);
  ctx.stroke();
  ctx.fillStyle = '#e2e8f0';
  ctx.fillRect(px + 22, py - 22, 6, 3);
  
  // 名字
  ctx.fillStyle = '#fff';
  ctx.font = '10px Microsoft YaHei';
  ctx.textAlign = 'center';
  ctx.fillText('Lv.' + p.level, px, py + 38);
  
  // Damage numbers
  ctx.textAlign = 'center';
  for (const dn of gameState.damageNumbers) {
    const alpha = dn.life / 40;
    ctx.fillStyle = dn.color + Math.floor(alpha * 255).toString(16).padStart(2, '0');
    ctx.font = '14px Microsoft YaHei';
    ctx.fillText(dn.text, dn.x, dn.y);
  }
}

// Update UI
function updateUI() {
  const p = gameState.player;
  const realm = getRealm(p.level);
  
  // Level + realm
  const lvEl = document.getElementById('player-level');
  if (lvEl) lvEl.textContent = 'Lv.' + p.level;
  const realmEl = document.getElementById('player-realm');
  if (realmEl) realmEl.textContent = realm.name + ' Lv.' + p.level;
  
  // HP
  const hpBar = document.getElementById('hp-bar');
  if (hpBar) hpBar.style.width = (p.hp / p.maxHp * 100) + '%';
  const hpText = document.getElementById('hp-text');
  if (hpText) hpText.textContent = Math.floor(p.hp) + '/' + p.maxHp;
  
  // MP
  const mpBar = document.getElementById('mp-bar');
  if (mpBar) mpBar.style.width = (p.mp / p.maxMp * 100) + '%';
  const mpText = document.getElementById('mp-text');
  if (mpText) mpText.textContent = Math.floor(p.mp) + '/' + p.maxMp;
  
  // EXP
  const expNeeded = expToLevel(p.level);
  const expBar = document.getElementById('exp-bar');
  if (expBar) expBar.style.width = (p.exp / expNeeded * 100) + '%';
  const expText = document.getElementById('exp-text');
  if (expText) expText.textContent = p.exp + '/' + expNeeded;
  
  // Stats
  const atkEl = document.getElementById('stat-atk');
  if (atkEl) atkEl.textContent = '攻击' + p.baseAtk;
  const defEl = document.getElementById('stat-def');
  if (defEl) defEl.textContent = '防御' + p.baseDef;
  const critEl = document.getElementById('stat-crit');
  if (critEl) critEl.textContent = '暴击' + p.crit + '%';
  const dodgeEl = document.getElementById('stat-dodge');
  if (dodgeEl) dodgeEl.textContent = '闪避' + p.dodge + '%';
  
  // Gold + kills
  const goldEl = document.getElementById('gold-count');
  if (goldEl) goldEl.textContent = p.gold;
  const killsEl = document.getElementById('kill-count');
  if (killsEl) killsEl.textContent = p.kills;
  
  // Inventory
  const invEl = document.getElementById('inventory-list');
  if (invEl) {
    invEl.innerHTML = '';
    for (const item of p.inventory) {
      if (!item) continue;
      const span = document.createElement('span');
      span.textContent = item.icon || '\u2753';
      span.title = item.name + ' ' + item.level + '级';
      invEl.appendChild(span);
    }
  }
  
  // Cooldowns
  for (let i = 0; i < 4; i++) {
    const cdEl = document.getElementById('skill-cd-' + i);
    if (cdEl) {
      const pct = Math.max(0, p.skillCooldowns[i] / (SKILLS[i] ? SKILLS[i].cooldown : 5000) * 100);
      cdEl.style.width = pct + '%';
    }
  }
}

// Drop modal
function showDropModal(drops) {
  const modal = document.getElementById('drop-modal');
  const list = document.getElementById('drop-list');
  if (!modal || !list) return;
  list.innerHTML = '';
  for (const item of drops) {
    if (!item) continue;
    const div = document.createElement('div');
    if (item.type === 'gold' || item.type === 'exp') {
      div.textContent = item.icon + ' ' + item.name + ' +' + item.value;
      div.style.color = '#f0c040';
    } else {
      const q = QUALITIES[item.quality] || { color: '#fff' };
      div.style.color = q.color;
      div.textContent = (item.icon || '\u2694') + ' ' + item.name + ' ' + item.level + '级';
      div.style.cursor = 'pointer';
      div.onclick = () => { addToInventory(item); modal.style.display = 'none'; };
    }
    list.appendChild(div);
  }
  modal.style.display = 'block';
  setTimeout(() => { modal.style.display = 'none'; }, 3000);
}

// Inventory management
function addToInventory(item) {
  if (!item) return;
  const idx = gameState.player.inventory.findIndex(i => !i);
  if (idx >= 0) {
    gameState.player.inventory[idx] = item;
  } else if (gameState.player.inventory.length < 20) {
    gameState.player.inventory.push(item);
  } else {
    log('背包已满!', 'damage');
    return;
  }
  log('获得: ' + item.name, 'info2');
  updateUI();
}

// Skills
function useSkill(index) {
  const skill = SKILLS[index];
  if (!skill) return;
  const p = gameState.player;
  if (p.mp < skill.cost) { log('法力不足!', 'damage'); return; }
  if (p.skillCooldowns[index] > 0) { log(skill.name + ' 冷却中', 'info'); return; }
  p.mp -= skill.cost;
  p.skillCooldowns[index] = skill.cooldown;
  
  if (skill.type === 'damage') {
    for (const mob of gameState.mobs) {
      if (distance(p.x, p.y, mob.x, mob.y) < skill.range) {
        const dmg = Math.max(1, Math.floor(p.baseAtk * skill.mult));
        mob.hp -= dmg;
        gameState.damageNumbers.push({ text: dmg, x: mob.x, y: mob.y - 30, color: '#a371f7', life: 40, crit: false });
        if (mob.hp <= 0) onMobDeath(mob);
      }
    }
  } else if (skill.type === 'heal') {
    const heal = Math.floor(skill.heal);
    p.hp = Math.min(p.maxHp, p.hp + heal);
    gameState.damageNumbers.push({ text: '+' + heal, x: p.x, y: p.y - 30, color: '#3fb950', life: 40, crit: false });
  }
  log('使用技能: ' + skill.name, 'skill');
}

// Save/Load
function saveGame(showMsg) {
  const data = JSON.stringify({ player: gameState.player, version: 1 });
  localStorage.setItem('xiantu_save', data);
  gameState.player.lastSave = Date.now();
  if (showMsg) log('游戏已自动存档', 'info');
}

function loadGame() {
  const raw = localStorage.getItem('xiantu_save');
  if (raw) {
    try {
      const data = JSON.parse(raw);
      if (data.player) {
        gameState.player = { ...gameState.player, ...data.player };
        gameState.player.hp = Math.min(gameState.player.hp, gameState.player.maxHp);
        gameState.player.mp = Math.min(gameState.player.mp, gameState.player.maxMp);
        gameState.mobs = [];
        updateUI();
        log('存档已加载 Lv.' + gameState.player.level + ' ' + getRealm(gameState.player.level).name, 'info');
        return;
      }
    } catch(e) { log('存档读取失败', 'damage'); }
  }
  initGame();
}

function initGame() {
  const p = gameState.player;
  p.level = 1; p.exp = 0; p.hp = p.maxHp; p.mp = p.maxMp;
  p.gold = 0; p.kills = 0;
  p.equipment = { weapon: null, helmet: null, armor: null, ring: null, amulet: null, boot: null };
  p.inventory = [];
  p.skillCooldowns = [0, 0, 0, 0];
  p.guaranteeCounters = {};
  gameState.mobs = [];
  gameState.particles = [];
  gameState.damageNumbers = [];
  updateUI();
  log('新游戏开始! 境界: ' + getRealm(1).name, 'level');
}

// Decorations
function rebuildDecorations() {
  if (decorations.mountains.length > 0) return;
  const canvas = document.getElementById('game-canvas');
  if (!canvas) return;
  const w = canvas.width, h = canvas.height;
  for (let i = 0; i < 5; i++) decorations.mountains.push({ x: w * (0.1 + i * 0.2), y: h * 0.3, w: 80 + rand(0, 40), h: 60 + rand(0, 30) });
  for (let i = 0; i < 10; i++) decorations.trees.push({ x: w * (0.05 + Math.random() * 0.9), y: h * (0.1 + Math.random() * 0.8), size: 10 + rand(0, 10) });
  decorations.rivers.push({ x: w * 0.4, y: h * 0.5, rx: 100, ry: 40 });
  for (let i = 0; i < 4; i++) decorations.farms.push({ x: w * (0.1 + i * 0.2), y: h * 0.7, w: 80, h: 40 });
  for (let i = 0; i < 15; i++) decorations.grass.push({ x: w * (0.05 + i * 0.06), y: h * (0.1 + (i % 5) * 0.18), size: 10 + i % 8 });
}

// Event listeners
document.addEventListener('keydown', e => {
  gameState.keys[e.key] = true;
  if (e.key >= '1' && e.key <= '4') useSkill(parseInt(e.key) - 1);
});
document.addEventListener('keyup', e => { gameState.keys[e.key] = false; });

const canvas = document.getElementById('game-canvas');
if (canvas) {
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    gameState.mouse.x = e.clientX - rect.left;
    gameState.mouse.y = e.clientY - rect.top;
  });
  canvas.addEventListener('mousedown', e => { gameState.mouse.down = true; });
  canvas.addEventListener('mouseup', e => { gameState.mouse.down = false; });
  canvas.addEventListener('contextmenu', e => e.preventDefault());
}
document.getElementById('btn-pause').addEventListener('click', () => {
  gameState.paused = !gameState.paused;
  document.getElementById('btn-pause').textContent = gameState.paused ? '\u25b6\ufe0f 继续' : '\u23f8\ufe0f 暂停';
});
document.getElementById('btn-save').addEventListener('click', () => { saveGame(true); });
document.getElementById('btn-load').addEventListener('click', loadGame);

// ===== STARTUP =====
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
rebuildDecorations();
loadGame();

function gameLoop(timestamp) {
  if (!gameState.paused) {
    const dt = Math.min(timestamp - (gameState._lastTime || timestamp), 50);
    gameState._lastTime = timestamp;
    update(dt);
    render();
  }
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
setInterval(spawnMob, 3000);

log('欢迎来到仙途!');
log('WASD移动, 鼠标攻击, 数字键1-4释放技能');
</script>
</body>
</html>
