<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏓 打砖块 - 搜罗天下游戏</title>
    <meta name="description" content="经典打砖块游戏！用球拍反弹小球击碎所有砖块，挑战最高分。搜罗天下免费在线小游戏。">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="games.css">
    <style>
        body { background: #0a0015; min-height: 100vh; }
        .game-container { max-width: 520px; margin: 0 auto; padding: 20px 16px 40px; }

        .game-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding: 14px 18px;
            background: rgba(15,0,35,0.8); border-radius: 14px; border: 1px solid rgba(139,92,246,0.2); }
        .back-btn { font-size: 20px; cursor: pointer; text-decoration: none; }
        .game-title-wrap h1 { font-size: 20px; color: #fff; margin: 0; font-weight: 700; }
        .game-title-wrap p { font-size: 12px; color: #6b7280; margin: 2px 0 0; }

        .stats-bar { display: flex; gap: 10px; margin-bottom: 16px; }
        .stat-box { flex: 1; background: rgba(15,0,35,0.8); border: 1px solid rgba(139,92,246,0.25);
            border-radius: 12px; padding: 10px 14px; text-align: center; }
        .stat-label { font-size: 10px; color: #a78bfa; text-transform: uppercase; letter-spacing: 1px; }
        .stat-num { font-size: 24px; font-weight: 800; color: #fff; }
        .stat-num.green { color: #34d399; }

        /* Canvas area */
        .canvas-wrap {
            position: relative; margin-bottom: 16px;
            border-radius: 14px; overflow: hidden;
            border: 2px solid rgba(139,92,246,0.3);
            background: #0d0820;
        }
        #gameCanvas { display: block; width: 100%; touch-action: none; }
        .canvas-overlay {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(10,0,25,0.85); backdrop-filter: blur(4px);
            gap: 12px; transition: opacity 0.3s;
        }
        .canvas-overlay.hidden { opacity: 0; pointer-events: none; }
        .canvas-title { font-size: 26px; font-weight: 800; color: #fff; text-align: center; }
        .canvas-sub { color: #9ca3af; font-size: 14px; text-align: center; max-width: 200px; }
        .canvas-btn { padding: 12px 32px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, #7c3aed, #db2777); color: #fff;
            font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .2s; }
        .canvas-btn:hover { box-shadow: 0 0 20px rgba(139,92,246,0.4); transform: scale(1.05); }

        .controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
        .ctrl-btn { padding: 10px 22px; border-radius: 10px; border: 1px solid rgba(139,92,246,0.3);
            background: rgba(15,0,35,0.8); color: #a78bfa; font-size: 13px; font-weight: 600;
            cursor: pointer; font-family: inherit; transition: all .2s; }
        .ctrl-btn:hover { border-color: #7c3aed; color: #fff; background: rgba(139,92,246,0.15); }
        .ctrl-btn.primary { background: linear-gradient(135deg, #7c3aed, #db2777); color: #fff; border: none; }

        .how-to { background: rgba(15,0,35,0.7); border-radius: 12px; padding: 16px;
            border: 1px solid rgba(139,92,246,0.15); }
        .how-to h3 { color: #a78bfa; font-size: 14px; margin: 0 0 8px; }
        .how-to p { color: #9ca3af; font-size: 13px; margin: 0; line-height: 1.6; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="game-header">
        <a href="games.html" class="back-btn">←</a>
        <div class="game-title-wrap">
            <h1>🏓 打砖块</h1>
            <p>击碎所有砖块 · 挑战最高分</p>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-box">
            <div class="stat-label">分数</div>
            <div class="stat-num green" id="score">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">最高分</div>
            <div class="stat-num" id="best">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">生命</div>
            <div class="stat-num" id="livesDisp">❤️❤️❤️</div>
        </div>
    </div>

    <div class="canvas-wrap" id="canvasWrap">
        <canvas id="gameCanvas"></canvas>
        <div class="canvas-overlay" id="startOverlay">
            <div class="canvas-title">🏓 打砖块</div>
            <div class="canvas-sub">用鼠标或触屏控制球拍，击碎所有砖块！</div>
            <button class="canvas-btn" onclick="startGame()">▶️ 开始游戏</button>
        </div>
    </div>

    <div class="controls">
        <button class="ctrl-btn primary" onclick="startGame()">🔄 重新开始</button>
    </div>

    <div class="how-to">
        <h3>📖 玩法说明</h3>
        <p>鼠标/触屏移动球拍，反弹小球击碎所有彩色砖块。漏球扣命，3命用完游戏结束。砖块越靠上分数越高！</p>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');

// Set canvas size
function resizeCanvas() {
    const w = wrap.clientWidth;
    canvas.width = w;
    canvas.height = w * 1.2;
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); if (!isRunning) render(); });

const COLORS = {
    ball: '#fff',
    paddle: 'linear-gradient(90deg, #7c3aed, #db2777)',
    bricks: [
        '#ef4444','#f97316','#f59e0b','#eab308',
        '#84cc16','#22c55e','#14b8a6','#06b6d4',
        '#3b82f6','#8b5cf6','#d946ef','#ec4899'
    ]
};

let paddle, ball, bricks, particles, score, lives, isRunning, animId, mouseX;
let best = parseInt(localStorage.getItem('gBrick_best') || '0');
document.getElementById('best').textContent = best;

function initGame() {
    score = 0; lives = 3;
    updateScore();
    const w = canvas.width, h = canvas.height;
    paddle = { x: w/2, y: h - 30, w: 80, h: 12, speed: 8 };
    const speed = Math.min(w / 300, 1.3);
    ball = {
        x: w/2, y: h - 50, r: 8,
        vx: speed * 3.5 * (Math.random() > 0.5 ? 1 : -1),
        vy: -speed * 5.5,
        speed: Math.min(w / 300, 1.3) * 5.5
    };
    bricks = [];
    const rows = 6, cols = 9, brickW = (w - 20) / cols - 4, brickH = 18;
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            bricks.push({
                x: 10 + c * (brickW + 4), y: 10 + r * (brickH + 6),
                w: brickW, h: brickH,
                color: COLORS.bricks[(r * cols + c) % COLORS.bricks.length],
                alive: true,
                points: (rows - r) * 10
            });
        }
    }
    particles = [];
}

function startGame() {
    initGame();
    document.getElementById('startOverlay').classList.add('hidden');
    isRunning = true;
    loop();
}

function updateScore() {
    document.getElementById('score').textContent = score;
    document.getElementById('best').textContent = best;
    document.getElementById('livesDisp').textContent = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);
}

// Particles
function spawnParticles(x, y, color) {
    for (let i = 0; i < 8; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 3;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 2,
            life: 1,
            color,
            size: 2 + Math.random() * 3
        });
    }
}

// Physics
function update() {
    if (!isRunning) return;
    const w = canvas.width, h = canvas.height;

    // Paddle follows mouse
    const target = mouseX - paddle.w / 2;
    paddle.x += (target - paddle.x) * 0.15;
    paddle.x = Math.max(0, Math.min(w - paddle.w, paddle.x));

    // Ball movement
    ball.x += ball.vx;
    ball.y += ball.vy;

    // Wall collision
    if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx *= -1; }
    if (ball.x + ball.r > w) { ball.x = w - ball.r; ball.vx *= -1; }
    if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy *= -1; }

    // Bottom - lose life
    if (ball.y + ball.r > h) {
        lives--;
        updateScore();
        if (lives <= 0) {
            isRunning = false;
            cancelAnimationFrame(animId);
            document.getElementById('startOverlay').classList.remove('hidden');
            if (score > best) {
                best = score;
                localStorage.setItem('gBrick_best', best);
                document.getElementById('best').textContent = best;
            }
            return;
        }
        // Reset ball
        ball.x = w / 2; ball.y = h - 50;
        ball.vx = ball.speed * (Math.random() > 0.5 ? 1 : -1);
        ball.vy = -ball.speed;
    }

    // Paddle collision
    if (ball.vy > 0 &&
        ball.y + ball.r > paddle.y &&
        ball.y - ball.r < paddle.y + paddle.h &&
        ball.x > paddle.x - ball.r &&
        ball.x < paddle.x + paddle.w + ball.r) {

        ball.y = paddle.y - ball.r;
        ball.vy = -ball.speed;
        const hitPos = (ball.x - paddle.x) / paddle.w;
        ball.vx = ball.speed * (hitPos * 2 - 1) * 1.2;
        ball.vx = Math.max(-ball.speed * 1.5, Math.min(ball.speed * 1.5, ball.vx));
    }

    // Brick collision
    for (const b of bricks) {
        if (!b.alive) continue;
        if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
            ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
            b.alive = false;
            score += b.points;
            updateScore();
            spawnParticles(b.x + b.w/2, b.y + b.h/2, b.color);

            // Determine collision side
            const overlapL = ball.x + ball.r - b.x;
            const overlapR = b.x + b.w - (ball.x - ball.r);
            const overlapT = ball.y + ball.r - b.y;
            const overlapB = b.y + b.h - (ball.y - ball.r);
            const minOverlap = Math.min(overlapL, overlapR, overlapT, overlapB);
            if (minOverlap === overlapT || minOverlap === overlapB) ball.vy *= -1;
            else ball.vx *= -1;
            break;
        }
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.04;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // Win check
    if (bricks.every(b => !b.alive)) {
        score += lives * 200;
        updateScore();
        if (score > best) {
            best = score;
            localStorage.setItem('gBrick_best', best);
            document.getElementById('best').textContent = best;
        }
        isRunning = false;
        cancelAnimationFrame(animId);
        alert('🎉 恭喜通关！得分: ' + score + ' (+' + (lives*200) + ' 奖励)');
        document.getElementById('startOverlay').classList.remove('hidden');
    }
}

function render() {
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    // Bricks
    for (const b of bricks) {
        if (!b.alive) continue;
        const g = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
        g.addColorStop(0, b.color);
        g.addColorStop(1, shadeColor(b.color, -30));
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.roundRect(b.x, b.y, b.w, b.h, 4);
        ctx.fill();
    }

    // Particles
    for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Ball trail
    if (isRunning) {
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#a78bfa';
        ctx.beginPath();
        ctx.arc(ball.x - ball.vx * 2, ball.y - ball.vy * 2, ball.r * 0.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }

    // Ball
    const ballG = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 0, ball.x, ball.y, ball.r);
    ballG.addColorStop(0, '#ffffff');
    ballG.addColorStop(1, '#c4b5fd');
    ctx.fillStyle = ballG;
    ctx.shadowColor = '#a78bfa';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Paddle
    const padG = ctx.createLinearGradient(paddle.x, 0, paddle.x + paddle.w, 0);
    padG.addColorStop(0, '#7c3aed');
    padG.addColorStop(1, '#db2777');
    ctx.fillStyle = padG;
    ctx.shadowColor = '#7c3aed';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 6);
    ctx.fill();
    ctx.shadowBlur = 0;
}

function shadeColor(color, percent) {
    const n = parseInt(color.slice(1), 16);
    const r = Math.max(0, Math.min(255, (n >> 16) + percent));
    const g = Math.max(0, Math.min(255, ((n >> 8) & 0xff) + percent));
    const b = Math.max(0, Math.min(255, (n & 0xff) + percent));
    return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

function loop() {
    update();
    render();
    if (isRunning) animId = requestAnimationFrame(loop);
}

// Input
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
});
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
}, { passive: false });
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
}, { passive: false });

// Initial render
initGame();
render();
</script>
</body>
</html>
