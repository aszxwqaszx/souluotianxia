<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 记忆翻牌 - 搜罗天下游戏</title>
    <meta name="description" content="经典记忆翻牌游戏，锻炼记忆力！找出所有配对，挑战最短时间。搜罗天下精选免费小游戏。">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="games.css">
    <style>
        body { background: #0a0015; min-height: 100vh; }
        .game-container { max-width: 600px; margin: 0 auto; padding: 20px 16px 40px; }
        .game-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding: 14px 18px;
            background: rgba(15,0,35,0.8); border-radius: 14px; border: 1px solid rgba(139,92,246,0.2); }
        .back-btn { font-size: 20px; cursor: pointer; text-decoration: none; }
        .game-title-wrap h1 { font-size: 20px; color: #fff; margin: 0; font-weight: 700; }
        .game-title-wrap p { font-size: 12px; color: #6b7280; margin: 2px 0 0; }

        .stats-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-box { flex: 1; background: rgba(15,0,35,0.8); border: 1px solid rgba(139,92,246,0.25);
            border-radius: 12px; padding: 10px 14px; text-align: center; }
        .stat-label { font-size: 10px; color: #a78bfa; text-transform: uppercase; letter-spacing: 1px; }
        .stat-num { font-size: 22px; font-weight: 800; color: #fff; }
        .stat-num.pink { color: #f472b6; }

        .game-board {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            margin-bottom: 20px; perspective: 800px;
        }
        .card {
            aspect-ratio: 3/4; cursor: pointer; position: relative;
            transform-style: preserve-3d; transition: transform 0.45s;
        }
        .card.flipped { transform: rotateY(180deg); }
        .card.matched { transform: rotateY(180deg); pointer-events: none; }
        .card-face {
            position: absolute; inset: 0; border-radius: 10px;
            backface-visibility: hidden; display: flex;
            align-items: center; justify-content: center;
            border: 2px solid rgba(139,92,246,0.3);
            font-size: clamp(28px, 6vw, 42px);
        }
        .card-back {
            background: linear-gradient(135deg, #2d1b69, #1a1040);
            background-image:
                radial-gradient(circle at 30% 30%, rgba(139,92,246,0.3) 0%, transparent 50%),
                radial-gradient(circle at 70% 70%, rgba(244,114,182,0.2) 0%, transparent 50%);
        }
        .card-back::after {
            content: '?'; font-size: clamp(22px, 5vw, 32px);
            color: rgba(139,92,246,0.5); font-weight: 800;
        }
        .card-front {
            background: rgba(20,0,40,0.95); transform: rotateY(180deg);
        }
        .card.matched .card-front { border-color: rgba(52,211,153,0.5); }
        .card.matched .card-front::after {
            content: '✅'; position: absolute; inset: 0;
            background: rgba(52,211,153,0.08); border-radius: 8px;
        }

        .card:hover:not(.flipped):not(.matched) .card-face { border-color: rgba(139,92,246,0.6); }
        .card.wrong .card-front { animation: shake 0.4s ease; }
        @keyframes shake {
            0%,100% { transform: rotateY(180deg) translateX(0); }
            25% { transform: rotateY(180deg) translateX(-6px); }
            75% { transform: rotateY(180deg) translateX(6px); }
        }
        @keyframes pop {
            0% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
            100% { transform: rotateY(180deg) scale(1); }
        }
        .card.matched .card-front { animation: pop 0.35s ease; }

        .controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
        .ctrl-btn { padding: 10px 22px; border-radius: 10px; border: 1px solid rgba(139,92,246,0.3);
            background: rgba(15,0,35,0.8); color: #a78bfa; font-size: 13px; font-weight: 600;
            cursor: pointer; font-family: inherit; transition: all .2s; }
        .ctrl-btn:hover { border-color: #7c3aed; color: #fff; background: rgba(139,92,246,0.15); }
        .ctrl-btn.primary { background: linear-gradient(135deg, #7c3aed, #db2777); color: #fff; border: none; }

        .win-overlay {
            position: fixed; inset: 0; background: rgba(10,0,25,0.92);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; backdrop-filter: blur(8px);
        }
        .win-overlay.show { display: flex; }
        .win-title {
            font-size: 42px; font-weight: 900; margin-bottom: 12px;
            background: linear-gradient(135deg, #f472b6, #a78bfa, #34d399);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: pulse 1s ease infinite alternate;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
        .win-stars { font-size: 48px; margin-bottom: 16px; }
        .win-stats { display: flex; gap: 24px; margin-bottom: 24px; }
        .win-stat { text-align: center; }
        .win-stat-val { font-size: 28px; font-weight: 800; color: #fff; }
        .win-stat-label { font-size: 12px; color: #9ca3af; }
        .win-btn { padding: 14px 36px; border-radius: 14px; font-size: 16px; font-weight: 700;
            background: linear-gradient(135deg, #7c3aed, #db2777); color: #fff;
            border: none; cursor: pointer; font-family: inherit; transition: all .2s; }
        .win-btn:hover { box-shadow: 0 0 30px rgba(139,92,246,0.5); transform: scale(1.05); }

        .how-to { background: rgba(15,0,35,0.7); border-radius: 12px; padding: 16px;
            border: 1px solid rgba(139,92,246,0.15); }
        .how-to h3 { color: #a78bfa; font-size: 14px; margin: 0 0 8px; }
        .how-to p { color: #9ca3af; font-size: 13px; margin: 0; line-height: 1.6; }

        /* Stars background */
        .card-back { position: relative; overflow: hidden; }
        .card-back::before {
            content: ''; position: absolute; inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.15) 1px, transparent 1px);
            background-size: 12px 12px;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="game-header">
        <a href="games.html" class="back-btn">←</a>
        <div class="game-title-wrap">
            <h1>🧠 记忆翻牌</h1>
            <p>找出所有配对 · 挑战最短时间</p>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-box">
            <div class="stat-label">⏱️ 用时</div>
            <div class="stat-num" id="timer">0:00</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">🔄 步数</div>
            <div class="stat-num" id="steps">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">🏆 最高分</div>
            <div class="stat-num pink" id="best">0</div>
        </div>
    </div>

    <div class="game-board" id="board"></div>

    <div class="controls">
        <button class="ctrl-btn primary" onclick="initGame()">🔄 重新开始</button>
        <button class="ctrl-btn" onclick="changeLevel()">📊 换个难度</button>
    </div>

    <div class="how-to">
        <h3>📖 玩法说明</h3>
        <p>点击翻开两张卡片，如果图案相同则配对成功。找出全部配对即可过关！记住卡片位置，下次更快配对。</p>
    </div>
</div>

<!-- 胜利弹窗 -->
<div class="win-overlay" id="winOverlay">
    <div class="win-stars" id="winStars">⭐⭐⭐</div>
    <div class="win-title">🎉 全部配对成功！</div>
    <div class="win-stats">
        <div class="win-stat"><div class="win-stat-val" id="winTime">0:00</div><div class="win-stat-label">用时</div></div>
        <div class="win-stat"><div class="win-stat-val" id="winSteps">0</div><div class="win-stat-label">步数</div>
    </div></div>
    <button class="win-btn" onclick="document.getElementById('winOverlay').classList.remove('show'); initGame();">🔄 再来一局</button>
</div>

<script>
const ICONS_16 = [
    '🍎','🍊','🍋','🍇','🍓','🍑','🍒','🥝',
    '🐶','🐱','🐼','🦊','🦁','🐸','🦋','🐙'
];
const ICONS_12 = ['🍎','🍊','🍋','🍇','🍓','🍑','🐶','🐱','🦊','🦁','🐸','🦋'];
const ICONS_8 = ['🍎','🍊','🍋','🍇','🐶','🐱','🦊','🐸'];

let level = 0; // 0=4x4, 1=4x3, 2=4x2
let totalPairs = 8;
let flipped = [], matched = 0, steps = 0, timerSec = 0, timerInterval = null;
let lock = false;

best = parseInt(localStorage.getItem('gMemory_best') || '0');
document.getElementById('best').textContent = best;

function getIcons() {
    const lv = [
        { cols: 4, rows: 4, icons: ICONS_16, pairs: 8 },
        { cols: 4, rows: 3, icons: ICONS_12, pairs: 6 },
        { cols: 4, rows: 2, icons: ICONS_8,  pairs: 4 }
    ];
    return lv[level];
}

function changeLevel() {
    level = (level + 1) % 3;
    initGame();
}

function shuffle(arr) {
    let a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function initGame() {
    clearInterval(timerInterval);
    const cfg = getIcons();
    const deck = shuffle([...cfg.icons.slice(0, cfg.pairs), ...cfg.icons.slice(0, cfg.pairs)]);
    flipped = [];
    matched = 0;
    steps = 0;
    timerSec = 0;
    lock = false;
    document.getElementById('timer').textContent = '0:00';
    document.getElementById('steps').textContent = '0';
    document.getElementById('winOverlay').classList.remove('show');

    const board = document.getElementById('board');
    board.style.gridTemplateColumns = `repeat(${cfg.cols}, 1fr)`;
    board.innerHTML = deck.map((icon, i) => `
        <div class="card" data-index="${i}" data-icon="${icon}" onclick="flipCard(this)">
            <div class="card-face card-back"></div>
            <div class="card-face card-front">${icon}</div>
        </div>
    `).join('');

    setTimeout(() => {
        document.querySelectorAll('.card').forEach(c => c.classList.add('flipped'));
        setTimeout(() => {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('flipped'));
            timerInterval = setInterval(() => {
                timerSec++;
                const m = Math.floor(timerSec / 60);
                const s = timerSec % 60;
                document.getElementById('timer').textContent = m + ':' + String(s).padStart(2, '0');
            }, 1000);
        }, 1200);
    }, 100);
}

function flipCard(el) {
    if (lock || el.classList.contains('flipped') || el.classList.contains('matched')) return;
    el.classList.add('flipped');
    flipped.push(el);
    if (flipped.length === 2) {
        steps++;
        document.getElementById('steps').textContent = steps;
        lock = true;
        const [a, b] = flipped;
        if (a.dataset.icon === b.dataset.icon) {
            // 配对成功
            setTimeout(() => {
                a.classList.add('matched');
                b.classList.add('matched');
                flipped = [];
                lock = false;
                matched++;
                if (matched === getIcons().pairs) gameWin();
            }, 350);
        } else {
            // 配对失败
            a.classList.add('wrong');
            b.classList.add('wrong');
            setTimeout(() => {
                a.classList.remove('flipped', 'wrong');
                b.classList.remove('flipped', 'wrong');
                flipped = [];
                lock = false;
            }, 800);
        }
    }
}

function gameWin() {
    clearInterval(timerInterval);
    const m = Math.floor(timerSec / 60);
    const s = timerSec % 60;
    const timeStr = m + ':' + String(s).padStart(2, '0');
    document.getElementById('winTime').textContent = timeStr;
    document.getElementById('winSteps').textContent = steps;

    // 星级评分
    const cfg = getIcons();
    const pairCount = cfg.pairs;
    let stars = '⭐';
    if (steps <= pairCount * 2.5) stars = '⭐⭐⭐';
    else if (steps <= pairCount * 4) stars = '⭐⭐';
    document.getElementById('winStars').textContent = stars;

    if (steps < best || best === 0) {
        best = steps;
        localStorage.setItem('gMemory_best', best);
        document.getElementById('best').textContent = best;
    }

    setTimeout(() => {
        document.getElementById('winOverlay').classList.add('show');
    }, 500);
}

initGame();
</script>
</body>
</html>
