<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧱 俄罗斯方块 - 搜罗天下游戏</title>
    <meta name="description" content="经典俄罗斯方块在线玩，排列消除挑战最高分！搜罗天下精选免费小游戏。">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="games.css">
    <style>
        body { background: #0a0015; min-height: 100vh; }
        .game-container { max-width: 540px; margin: 0 auto; padding: 20px 16px 40px; }
        .game-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding: 14px 18px;
            background: rgba(15,0,35,0.8); border-radius: 14px; border: 1px solid rgba(139,92,246,0.2); }
        .back-btn { font-size: 20px; cursor: pointer; text-decoration: none; }
        .game-title-wrap h1 { font-size: 20px; color: #fff; margin: 0; font-weight: 700; }
        .game-title-wrap p { font-size: 12px; color: #6b7280; margin: 2px 0 0; }

        .hud { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .hud-item { flex: 1; background: rgba(15,0,35,0.8); border: 1px solid rgba(139,92,246,0.25);
            border-radius: 12px; padding: 12px 14px; text-align: center; min-width: 80px; }
        .hud-label { font-size: 10px; color: #a78bfa; text-transform: uppercase; letter-spacing: 1px; }
        .hud-val { font-size: 22px; font-weight: 800; color: #fff; }
        .hud-val.pink { color: #f472b6; }
        .hud-val.green { color: #34d399; }

        .game-area { display: flex; gap: 14px; align-items: flex-start; }
        #nextCanvas { border-radius: 10px; border: 1px solid rgba(139,92,246,0.3);
            background: #0d0020; display: block; }
        .side-panel { display: flex; flex-direction: column; gap: 10px; min-width: 100px; }
        .side-box { background: rgba(15,0,35,0.8); border: 1px solid rgba(139,92,246,0.2);
            border-radius: 12px; padding: 10px; text-align: center; }
        .side-box h4 { font-size: 10px; color: #a78bfa; margin: 0 0 4px; text-transform: uppercase; letter-spacing: 1px; }
        .side-box .val { font-size: 16px; font-weight: 800; color: #fff; }

        .canvas-wrap { position: relative; }
        #gameCanvas { display: block; width: 100%; border-radius: 14px;
            border: 2px solid rgba(139,92,246,0.3); background: #0d0020; }

        .overlay {
            position: absolute; inset: 0; border-radius: 12px;
            background: rgba(10,0,25,0.88); display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 14px; backdrop-filter: blur(4px);
        }
        .overlay.hidden { display: none; }
        .overlay h2 { color: #fff; font-size: 26px; margin: 0; font-weight: 800; }
        .overlay p { color: #9ca3af; font-size: 14px; margin: 0; }
        .start-btn { padding: 13px 36px; border-radius: 12px; font-size: 16px; font-weight: 700;
            background: linear-gradient(135deg,#7c3aed,#db2777); color: #fff;
            border: none; cursor: pointer; font-family: inherit; transition: all .2s; }
        .start-btn:hover { box-shadow: 0 0 25px rgba(139,92,246,.4); transform: scale(1.05); }

        .controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 14px; }
        .ctrl-btn { padding: 9px 18px; border-radius: 10px; border: 1px solid rgba(139,92,246,0.3);
            background: rgba(15,0,35,0.8); color: #a78bfa; font-size: 12px; font-weight: 600;
            cursor: pointer; font-family: inherit; transition: all .2s; }
        .ctrl-btn:hover { border-color: #7c3aed; color: #fff; background: rgba(139,92,246,0.15); }

        /* Mobile controls */
        .mobile-dpad { display: grid; grid-template-columns: repeat(3, 52px); grid-template-rows: repeat(3, 52px); gap: 4px; justify-content: center; margin-top: 12px; }
        .md-btn { width: 52px; height: 52px; border-radius: 12px; border: 2px solid rgba(139,92,246,0.35);
            background: rgba(15,0,35,0.9); color: #a78bfa; font-size: 22px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all .15s;
            user-select: none; -webkit-user-select: none; }
        .md-btn:active { background: rgba(139,92,246,0.3); transform: scale(0.9); }
        .md-rot-l { grid-column: 1; }
        .md-down { grid-column: 2; }
        .md-rot-r { grid-column: 3; }
        .md-left { grid-column: 1; grid-row: 2; }
        .md-drop { grid-column: 2; grid-row: 2; font-size: 16px; font-weight: 700; }
        .md-right { grid-column: 3; grid-row: 2; }
        .md-space { grid-column: 2; grid-row: 3; font-size: 12px; color: #6b7280; }

        .how-to { background: rgba(15,0,35,0.7); border-radius: 12px; padding: 14px;
            border: 1px solid rgba(139,92,246,0.15); margin-top: 14px; }
        .how-to h3 { color: #a78bfa; font-size: 13px; margin: 0 0 6px; }
        .how-to p { color: #9ca3af; font-size: 12px; margin: 0; line-height: 1.6; }

        @media (max-width: 480px) {
            .hud { gap: 8px; }
            .hud-item { padding: 8px 10px; min-width: 60px; }
            .hud-val { font-size: 18px; }
            .game-area { flex-direction: column; }
            .side-panel { flex-direction: row; flex-wrap: wrap; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="game-header">
        <a href="games.html" class="back-btn">←</a>
        <div class="game-title-wrap">
            <h1>🧱 俄罗斯方块</h1>
            <p>经典消除 · 挑战最高分</p>
        </div>
    </div>

    <div class="hud">
        <div class="hud-item">
            <div class="hud-label">分数</div>
            <div class="hud-val" id="score">0</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">最高</div>
            <div class="hud-val pink" id="best">0</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">行数</div>
            <div class="hud-val green" id="lines">0</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">关卡</div>
            <div class="hud-val" id="level">1</div>
        </div>
    </div>

    <div class="game-area">
        <div class="canvas-wrap">
            <canvas id="gameCanvas" width="300" height="600"></canvas>
            <div class="overlay" id="startOverlay">
                <h2>🧱 俄罗斯方块</h2>
                <p>排列方块消除整行得分<br>消灭行数越多分数越高！</p>
                <button class="start-btn" onclick="startGame()">▶️ 开始游戏</button>
            </div>
            <div class="overlay hidden" id="overOverlay">
                <h2 id="overTitle">💔 游戏结束</h2>
                <p id="overMsg">得分 0，加油！</p>
                <button class="start-btn" onclick="startGame()">🔄 再来一局</button>
            </div>
        </div>

        <div class="side-panel">
            <div class="side-box">
                <h4>下一个</h4>
                <canvas id="nextCanvas" width="80" height="80"></canvas>
            </div>
            <div class="side-box">
                <h4>操作</h4>
                <div style="font-size:11px;color:#6b7280;line-height:1.8">
                    ←→ 移动<br>↑ 旋转<br>↓ 加速<br>空格 落地
                </div>
            </div>
            <div class="side-box">
                <h4>分数</h4>
                <div class="val" id="sideScore">0</div>
            </div>
        </div>
    </div>

    <div class="mobile-dpad">
        <button class="md-btn md-rot-l" ontouchstart="rotate(-1)" onclick="rotate(-1)">↶</button>
        <button class="md-btn md-down" ontouchstart="down()" onclick="down()">↓</button>
        <button class="md-btn md-rot-r" ontouchstart="rotate(1)" onclick="rotate(1)">↷</button>
        <button class="md-btn md-left" ontouchstart="move(-1)" onclick="move(-1)">←</button>
        <button class="md-btn md-drop" ontouchstart="hardDrop()" onclick="hardDrop()">⬇️</button>
        <button class="md-btn md-right" ontouchstart="move(1)" onclick="move(1)">→</button>
        <div class="md-space"></div>
    </div>

    <div class="controls">
        <button class="ctrl-btn" onclick="startGame()">🔄 重开</button>
        <button class="ctrl-btn" id="pauseBtn" onclick="togglePause()">⏸️ 暂停</button>
    </div>

    <div class="how-to">
        <h3>📖 玩法说明</h3>
        <p>← → 移动方块，↑ 旋转，↓ 加速下落，空格键直接落地。当一整行被方块填满时消除得分。随着消除行数增加，关卡和速度也会提高！</p>
    </div>
</div>

<script>
// ====== CONSTANTS ======
const COLS = 10, ROWS = 20, CELL = 30;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('nextCanvas');
const nCtx = nextCanvas.getContext('2d');

// Tetromino shapes (each has 4 rotations)
const SHAPES = [
    // I
    { color: '#06b6d4', cells: [[0,1],[1,1],[2,1],[3,1]], glow: '#06b6d4' },
    // O
    { color: '#facc15', cells: [[0,0],[1,0],[0,1],[1,1]], glow: '#facc15' },
    // T
    { color: '#a855f7', cells: [[1,0],[0,1],[1,1],[2,1]], glow: '#a855f7' },
    // S
    { color: '#22c55e', cells: [[1,0],[2,0],[0,1],[1,1]], glow: '#22c55e' },
    // Z
    { color: '#ef4444', cells: [[0,0],[1,0],[1,1],[2,1]], glow: '#ef4444' },
    // J
    { color: '#3b82f6', cells: [[0,0],[0,1],[1,1],[2,1]], glow: '#3b82f6' },
    // L
    { color: '#f97316', cells: [[2,0],[0,1],[1,1],[2,1]], glow: '#f97316' },
];

// Board: 0 = empty, [shapeIdx, color, glow] = filled
let board = [];
let current, nextIdx, score, lines, level, interval;
let gameState = 'idle'; // idle, playing, paused, over
let bag = []; // 7-bag randomizer

// ====== INIT ======
function initBoard() {
    board = [];
    for (let r = 0; r < ROWS; r++) {
        board[r] = new Array(COLS).fill(0);
    }
}

function startGame() {
    initBoard();
    score = 0; lines = 0; level = 1;
    bag = [];
    gameState = 'playing';
    document.getElementById('startOverlay').classList.add('hidden');
    document.getElementById('overOverlay').classList.add('hidden');
    document.getElementById('pauseBtn').textContent = '⏸️ 暂停';
    document.getElementById('score').textContent = 0;
    document.getElementById('lines').textContent = 0;
    document.getElementById('level').textContent = 1;
    document.getElementById('sideScore').textContent = 0;
    if (interval) clearInterval(interval);
    nextIdx = pickPiece();
    spawnPiece();
    draw();
}

function pickPiece() {
    if (bag.length === 0) {
        bag = [...Array(7).keys()];
        // Fisher-Yates shuffle
        for (let i = bag.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [bag[i], bag[j]] = [bag[j], bag[i]];
        }
    }
    return bag.pop();
}

function spawnPiece() {
    current = {
        idx: nextIdx,
        x: Math.floor((COLS - 4) / 2),
        y: 0,
        rot: 0,
    };
    nextIdx = pickPiece();
    drawNext();
    if (!valid(current.x, current.y, current.rot)) {
        gameOver();
    }
}

// ====== ROTATION ======
function rotate(dir) {
    if (gameState !== 'playing') return;
    let newRot = (current.rot + dir + 4) % 4;
    if (valid(current.x, current.y, newRot)) {
        current.rot = newRot;
        draw(); return;
    }
    // Wall kicks
    let kicks = [-1, 1, -2, 2];
    for (let k of kicks) {
        if (valid(current.x + k, current.y, newRot)) {
            current.x += k; current.rot = newRot;
            draw(); return;
        }
    }
}

function move(dx) {
    if (gameState !== 'playing') return;
    if (valid(current.x + dx, current.y, current.rot)) {
        current.x += dx; draw();
    }
}

function down() {
    if (gameState !== 'playing') return;
    if (valid(current.x, current.y + 1, current.rot)) {
        current.y++; draw();
    }
}

function hardDrop() {
    if (gameState !== 'playing') return;
    while (valid(current.x, current.y + 1, current.rot)) current.y++;
    lock();
}

// ====== COLLISION ======
function getCells(idx, x, y, rot) {
    let shape = SHAPES[idx];
    let cells = shape.cells.map(c => [c[0], c[1]]);
    // Rotate
    for (let i = 0; i < rot; i++) {
        cells = cells.map(([cx, cy]) => [-(cy - 1), cx]);
    }
    // Normalize: find min
    let minX = Math.min(...cells.map(c => c[0]));
    let minY = Math.min(...cells.map(c => c[1]));
    return cells.map(([cx, cy]) => [x + cx - minX, y + cy - minY]);
}

function valid(x, y, rot) {
    let cells = getCells(current.idx, x, y, rot);
    for (let [cx, cy] of cells) {
        if (cx < 0 || cx >= COLS || cy >= ROWS) return false;
        if (cy >= 0 && board[cy][cx]) return false;
    }
    return true;
}

// ====== LOCK & CLEAR ======
function lock() {
    let cells = getCells(current.idx, current.x, current.y, current.rot);
    for (let [cx, cy] of cells) {
        if (cy < 0) { gameOver(); return; }
        board[cy][cx] = [current.idx, SHAPES[current.idx].color, SHAPES[current.idx].glow];
    }
    clearLines();
    spawnPiece();
}

function clearLines() {
    let cleared = 0;
    for (let r = ROWS - 1; r >= 0; r--) {
        if (board[r].every(c => c !== 0)) {
            board.splice(r, 1);
            board.unshift(new Array(COLS).fill(0));
            cleared++;
            r++; // recheck this row
        }
    }
    if (cleared === 0) return;
    // Scoring
    let pts = [0,100,300,500,800][cleared] || 0;
    score += pts * level;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    // Save best
    let best = parseInt(localStorage.getItem('gTetris_best') || '0');
    if (score > best) {
        best = score;
        localStorage.setItem('gTetris_best', best);
    }
    document.getElementById('score').textContent = score;
    document.getElementById('sideScore').textContent = score;
    document.getElementById('best').textContent = best;
    document.getElementById('lines').textContent = lines;
    document.getElementById('level').textContent = level;
    // Speed up
    if (interval) clearInterval(interval);
    let speed = Math.max(100, 800 - (level - 1) * 70);
    interval = setInterval(tick, speed);
    draw();
}

function tick() {
    if (gameState !== 'playing') return;
    if (valid(current.x, current.y + 1, current.rot)) {
        current.y++; draw();
    } else {
        lock();
    }
}

function gameOver() {
    gameState = 'over';
    clearInterval(interval);
    let best = parseInt(localStorage.getItem('gTetris_best') || '0');
    document.getElementById('overMsg').textContent = '得分 ' + score + '，最高 ' + best + '！';
    document.getElementById('overOverlay').classList.remove('hidden');
}

function togglePause() {
    if (gameState === 'playing') {
        gameState = 'paused';
        clearInterval(interval);
        document.getElementById('pauseBtn').textContent = '▶️ 继续';
    } else if (gameState === 'paused') {
        gameState = 'playing';
        let speed = Math.max(100, 800 - (level - 1) * 70);
        interval = setInterval(tick, speed);
        document.getElementById('pauseBtn').textContent = '⏸️ 暂停';
    }
}

// ====== DRAW ======
function draw() {
    ctx.fillStyle = '#0d0020';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // Grid
    ctx.strokeStyle = 'rgba(139,92,246,0.07)';
    ctx.lineWidth = 0.5;
    for (let c = 0; c <= COLS; c++) {
        ctx.beginPath(); ctx.moveTo(c*CELL, 0); ctx.lineTo(c*CELL, ROWS*CELL); ctx.stroke();
    }
    for (let r = 0; r <= ROWS; r++) {
        ctx.beginPath(); ctx.moveTo(0, r*CELL); ctx.lineTo(COLS*CELL, r*CELL); ctx.stroke();
    }
    // Ghost piece
    if (gameState === 'playing' && current) {
        let gy = current.y;
        while (valid(current.x, gy + 1, current.rot)) gy++;
        let ghost = getCells(current.idx, current.x, gy, current.rot);
        let shape = SHAPES[current.idx];
        for (let [cx, cy] of ghost) {
            if (cy >= 0) {
                ctx.strokeStyle = shape.color + '55';
                ctx.lineWidth = 2;
                ctx.strokeRect(cx*CELL+2, cy*CELL+2, CELL-4, CELL-4);
            }
        }
    }
    // Board
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (!board[r][c]) continue;
            let [, color, glow] = board[r][c];
            ctx.shadowBlur = 8; ctx.shadowColor = glow;
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.roundRect(c*CELL+2, r*CELL+2, CELL-4, CELL-4, 3); ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(c*CELL+3, r*CELL+3, CELL-6, 4);
        }
    }
    // Current piece
    if (gameState === 'playing' && current) {
        let cells = getCells(current.idx, current.x, current.y, current.rot);
        let shape = SHAPES[current.idx];
        for (let [cx, cy] of cells) {
            if (cy < 0) continue;
            ctx.shadowBlur = 12; ctx.shadowColor = shape.glow;
            ctx.fillStyle = shape.color;
            ctx.beginPath(); ctx.roundRect(cx*CELL+2, cy*CELL+2, CELL-4, CELL-4, 4); ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.fillRect(cx*CELL+3, cy*CELL+3, CELL-6, 4);
        }
    }
}

function drawNext() {
    nCtx.fillStyle = '#0d0020';
    nCtx.fillRect(0, 0, 80, 80);
    let shape = SHAPES[nextIdx];
    let cells = getCells(nextIdx, 0, 0, 0);
    let cs = 18;
    let offsetX = (80 - cells.reduce((m,c)=>Math.max(m,c[0]+1),0)*cs) / 2;
    let offsetY = (80 - cells.reduce((m,c)=>Math.max(m,c[1]+1),0)*cs) / 2;
    for (let [cx, cy] of cells) {
        nCtx.shadowBlur = 8; nCtx.shadowColor = shape.glow;
        nCtx.fillStyle = shape.color;
        nCtx.beginPath();
        nCtx.roundRect(offsetX+cx*cs+1, offsetY+cy*cs+1, cs-2, cs-2, 3);
        nCtx.fill();
        nCtx.shadowBlur = 0;
    }
}

// ====== INPUT ======
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') { e.preventDefault(); move(-1); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); move(1); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); down(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); rotate(1); }
    else if (e.key === ' ') { e.preventDefault(); hardDrop(); }
    else if (e.key === 'p' || e.key === 'P') togglePause();
});

// Touch swipe on canvas
let tx=0, ty=0;
canvas.addEventListener('touchstart', e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; }, {passive:true});
canvas.addEventListener('touchend', e => {
    if (!tx) return;
    let dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
    if (Math.max(Math.abs(dx),Math.abs(dy))<20) return;
    if (Math.abs(dx)>Math.abs(dy)) { if(dx>0) move(1); else move(-1); }
    else { if(dy>0) down(); else rotate(1); }
}, {passive:true});

// Init display
initBoard();
draw();
</script>
</body>
</html>
