    <script>
    let allWalls = [];

    async function loadWallpapers() {
        const grid = document.getElementById('wpGrid');
        try {
            const res = await fetch('wallpapers.json');
            allWalls = await res.json();
            renderWallpapers(allWalls);
            initFilters();
        } catch(e) {
            grid.innerHTML = '<p style="text-align:center;color:#999;padding:40px 0;">澹佺焊鍔犺浇澶辫触锛岃绋嶅悗鍐嶈瘯銆?/p>';
        }
    }

    function renderWallpapers(data) {
        const grid = document.getElementById('wpGrid');
        if (data.length === 0) {
            grid.innerHTML = '<p style="text-align:center;color:#999;padding:40px 0;">璇ュ垎绫绘殏鏃犲绾革紝鏁鏈熷緟锛?/p>';
            return;
        }
        grid.innerHTML = data.map(item => `
            <div class="wp-card" data-cat="${item.category}" data-device="${item.device}" data-id="${item.id}">
                <div class="wp-thumb-wrap">
                    <img class="wp-thumb" src="${item.thumb}" alt="${item.title}" loading="lazy">
                    <div class="wp-overlay">
                        <span class="wp-view-btn">馃攳 棰勮</span>
                    </div>
                </div>
                <div class="wp-card-info">
                    <span class="wp-card-title">${item.title}</span>
                    <span class="wp-card-cat">${item.catText}</span>
                </div>
            </div>
        `).join('');

        // 缁戝畾鐐瑰嚮棰勮
        grid.querySelectorAll('.wp-card').forEach(card => {
            card.addEventListener('click', () => openLightbox(card.dataset.id));
        });
    }

    function initFilters() {
        // 鍒嗙被绛涢€?        document.querySelectorAll('.wp-filter').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.wp-filter').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                applyFilters();
            });
        });
        // 璁惧绛涢€?        document.querySelectorAll('.wp-device').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.wp-device').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                applyFilters();
            });
        });
    }

    function applyFilters() {
        const cat = document.querySelector('.wp-filter.active').dataset.cat;
        const device = document.querySelector('.wp-device.active').dataset.device;
        let filtered = allWalls;
        if (cat !== 'all') filtered = filtered.filter(w => w.category === cat);
        if (device !== 'all') filtered = filtered.filter(w => w.device === device);
        renderWallpapers(filtered);
    }

    function openLightbox(id) {
        const item = allWalls.find(w => w.id == id);
        if (!item) return;
        document.getElementById('lbImg').src = item.url;
        document.getElementById('lbTitle').textContent = item.title;
        document.getElementById('lbAuthor').textContent = item.author ? '馃摳 ' + item.author : '';
        document.getElementById('lbTags').innerHTML = item.tags.map(t => `<span class="lb-tag">${t}</span>`).join('');
        document.getElementById('lbDownload').href = item.url;
        document.getElementById('lightbox').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('active');
        document.body.style.overflow = '';
    }

    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.querySelector('.lightbox-overlay').addEventListener('click', closeLightbox);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    loadWallpapers();
    </script>

</body>
