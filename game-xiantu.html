<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仙途 - 简约修仙打宝RPG</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #0a0a0f;
  color: #e0e0e0;
  font-family: 'Microsoft YaHei', sans-serif;
  user-select: none;
}
#game-container {
  display: flex;
  width: 100%;
  height: 100vh;
  overflow: hidden;
}
/* Canvas - 明确尺寸 */
#game-canvas {
  flex: 1;
  height: 100vh;
  display: block;
  background: #0d1117;
}
/* 右侧面板 */
#side-panel {
  width: 260px;
  min-width: 260px;
  background: #0d1117;
  border-left: 1px solid #30363d;
  display: flex;
  flex-direction: column;
  font-size: 12px;
  overflow-y: auto;
  overflow-x: hidden;
}
.panel-section { padding: 8px 10px; border-bottom: 1px solid #21262d; }
.panel-title {
  color: #58a6ff;
  font-size: 10px;
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
#player-name { font-size: 14px; font-weight: bold; color: #f0f6fc; }
#player-realm { color: #ffa500; font-size: 11px; }
.stat-row {
  display: flex;
  justify-content: space-between;
  margin: 2px 0;
  font-size: 11px;
}
.stat-bar {
  height: 8px;
  background: #21262d;
  border-radius: 4px;
  margin-top: 2px;
  overflow: hidden;
  position: relative;
}
.stat-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.3s;
  position: relative;
}
.stat-fill::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 50%;
  background: rgba(255,255,255,0.15);
  border-radius: 4px 4px 0 0;
}
.hp-fill { background: linear-gradient(180deg, #f85149 0%, #da3633 100%); }
.mp-fill { background: linear-gradient(180deg, #58a6ff 0%, #1f6feb 100%); }
.exp-fill { background: linear-gradient(180deg, #3fb950 0%, #238636 100%); }
.equip-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
.equip-slot {
  aspect-ratio: 1;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  cursor: pointer;
}
.equip-slot:hover { border-color: #58a6ff; }
.equip-slot.q-green { border-color: #3fb950; background: rgba(63,185,80,0.12); }
.equip-slot.q-blue { border-color: #58a6ff; background: rgba(88,166,255,0.12); }
.equip-slot.q-purple { border-color: #a371f7; background: rgba(163,113,247,0.12); }
.equip-slot.q-orange { border-color: #d29922; background: rgba(210,153,34,0.12); }
.equip-slot.q-red { border-color: #f85149; background: rgba(248,81,73,0.12); }
.skill-bar { display: flex; gap: 4px; }
.skill-slot {
  width: 40px;
  height: 40px;
  background: #161b22;
  border: 2px solid #30363d;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  cursor: pointer;
  position: relative;
}
.skill-slot:hover { border-color: #58a6ff; }
.skill-slot.on-cooldown { opacity: 0.5; }
.skill-slot .cd-timer {
  position: absolute;
  bottom: 1px;
  right: 2px;
  font-size: 9px;
  color: #f85149;
  font-weight: bold;
}
.skill-key {
  position: absolute;
  top: 1px;
  left: 2px;
  font-size: 9px;
  color: #8b949e;
}
#inventory-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 2px;
}
.inv-slot {
  aspect-ratio: 1;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  cursor: pointer;
  position: relative;
}
.inv-slot:hover { border-color: #58a6ff; }
.inv-slot .item-count {
  position: absolute;
  bottom: 0;
  right: 1px;
  font-size: 9px;
  color: #f0f6fc;
}
#combat-log {
  flex: 1;
  overflow-y: auto;
  padding: 5px 10px;
  font-size: 10px;
  line-height: 1.5;
  min-height: 0;
}
.log-item { margin: 1px 0; }
.log-damage { color: #f85149; }
.log-heal { color: #3fb950; }
.log-drop { color: #ffa657; }
.log-exp { color: #a371f7; }
.log-level { color: #ffd700; font-weight: bold; }
.log-realm { color: #ff69b4; font-weight: bold; }
/* 掉落弹窗 */
#drop-modal {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #0d1117;
  border: 2px solid #d29922;
  border-radius: 12px;
  padding: 16px;
  min-width: 280px;
  display: none;
  z-index: 200;
  text-align: center;
  box-shadow: 0 0 40px rgba(210,153,34,0.3);
}
#drop-modal.show { display: block; }
#drop-modal h3 { color: #ffa657; margin-bottom: 10px; }
#drop-items { margin: 10px 0; }
.drop-item {
  padding: 6px;
  margin: 3px 0;
  background: #161b22;
  border-radius: 4px;
}
#drop-modal button {
  margin-top: 10px;
  padding: 6px 24px;
  background: #238636;
  border: none;
  border-radius: 6px;
  color: #fff;
  cursor: pointer;
  font-size: 13px;
}
#drop-modal button:hover { background: #2ea043; }
/* 境界升级特效弹窗 */
#realm-modal {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #0d1117;
  border: 2px solid #ffd700;
  border-radius: 16px;
  padding: 24px 32px;
  display: none;
  z-index: 300;
  text-align: center;
  box-shadow: 0 0 60px rgba(255,215,0,0.5);
  animation: realmPopIn 0.5s ease-out;
}
#realm-modal.show { display: block; }
#realm-modal h2 { color: #ffd700; font-size: 20px; margin-bottom: 6px; }
#realm-modal h3 { color: #ffa500; font-size: 28px; margin-bottom: 6px; }
#realm-modal p { color: #8b949e; font-size: 12px; margin: 4px 0; }
#realm-modal .reward { color: #3fb950; font-size: 13px; }
#realm-modal button {
  margin-top: 16px;
  padding: 8px 32px;
  background: linear-gradient(135deg, #d29922, #ffa500);
  border: none;
  border-radius: 8px;
  color: #0a0a0f;
  font-weight: bold;
  font-size: 14px;
  cursor: pointer;
}
@keyframes realmPopIn {
  0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}
/* 底部状态栏 */
#bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 260px;
  height: 32px;
  background: rgba(22,27,34,0.95);
  border-top: 1px solid #30363d;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 16px;
  font-size: 11px;
  z-index: 10;
}
#bottom-bar .coord { color: #8b949e; }
#bottom-bar .gold { color: #ffa657; }
#bottom-bar .kills { color: #f85149; }
/* 顶部控制 */
#top-controls {
  position: fixed;
  top: 8px;
  left: 8px;
  display: flex;
  gap: 6px;
  z-index: 50;
}
.ctrl-btn {
  width: 32px;
  height: 32px;
  background: rgba(22,27,34,0.9);
  border: 1px solid #30363d;
  border-radius: 6px;
  color: #8b949e;
  cursor: pointer;
  font-size: 14px;
}
.ctrl-btn:hover { border-color: #58a6ff; color: #f0f6fc; }
/* 境界提示 */
#realm-hint {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(13,17,23,0.9);
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 6px 16px;
  font-size: 12px;
  color: #8b949e;
  z-index: 10;
  pointer-events: none;
}
</style>
</head>

    </div>
    <div id="combat-log"></div>
  </div>
</div>

<div id="bottom-bar">
  <span class="coord">📍 <span id="pos-text">0, 0</span></span>
  <span class="gold">💰 <span id="gold-text">0</span></span>
  <span class="kills">⚔️ <span id="kills-text">0</span></span>

</div>

<div id="realm-hint"></div>

<div id="top-controls">
  <button class="ctrl-btn" id="btn-pause" title="暂停">⏸️</button>

<div id="drop-modal">

};

// ==================== 工具函数 ====================
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function randFloat(min, max) { return Math.random() * (max - min) + min; }
function distance(x1, y1, x2, y2) { return Math.sqrt((x2-x1)**2 + (y2-y1)**2); }

function getRealm(level) {
  for (let i = REALMS.length - 1; i >= 0; i--) {
    if (level >= REALMS[i].minLv) return { ...REALMS[i], index: i };
  }
  return { ...REALMS[0], index: 0 };
}

function expToLevel(level) {
  return Math.floor(100 * Math.pow(1.15, level - 1));
}

// ==================== 装备生成 ====================
function generateEquip(type, qualityIndex, level) {
  const quality = QUALITIES[qualityIndex];
  const equipType = EQUIP_TYPES[type];
  const nameIndex = Math.min(Math.floor(level / 15), 6);
  const baseAtk = Math.floor(equipType.baseAtk * quality.mult * (1 + level * 0.1));
  const baseDef = Math.floor(equipType.baseDef * quality.mult * (1 + level * 0.1));
  const affixes = [];
  const usedStats = new Set();
  for (let i = 0; i < Math.min(qualityIndex, 3); i++) {
    const avail = AFFIXES.filter(a => !usedStats.has(a.stat));
    if (!avail.length) break;
    const affix = avail[rand(0, avail.length - 1)];
    usedStats.add(affix.stat);
    affixes.push({ name: affix.name, stat: affix.stat, value: rand(affix.min, affix.max) * (qualityIndex + 1) });
  }
  return { id: Date.now() + Math.random(), type, name: EQUIP_NAMES[type][nameIndex], quality: qualityIndex, level, atk: baseAtk, def: baseDef, affixes, icon: equipType.icon };
}

// ==================== 掉落处理 ====================
function processDrop(mob, mobType) {
  const drops = [];
  const monster = MONSTERS[mobType];
  const key = mobType;
  gameState.player.guaranteeCounters[key] = (gameState.player.guaranteeCounters[key] || 0) + 1;
  if (monster.guarantee && gameState.player.guaranteeCounters[key] >= monster.guarantee.kills) {
    const r = monster.guarantee.reward;
    if (r.type === 'equip') {
      const types = Object.keys(EQUIP_TYPES);
      drops.push(generateEquip(types[rand(0, types.length - 1)], r.quality, r.level));
    }
    gameState.player.guaranteeCounters[key] = 0;
  }
  for (const drop of monster.dropTable) {
    if (Math.random() < drop.rate) {
      if (drop.type === 'gold') drops.push({ type: 'gold', amount: rand(drop.min, drop.max) });
      else if (drop.type === 'item') drops.push({ type: 'item', ...ITEMS[drop.id], id: drop.id });
      else if (drop.type === 'equip') {
        const types = Object.keys(EQUIP_TYPES);
        drops.push(generateEquip(types[rand(0, types.length - 1)], rand(drop.qualityRange[0], drop.qualityRange[1]), rand(drop.levelRange[0], drop.levelRange[1])));
      }
    }
  }
  return drops;
}

// ==================== UI 更新 ====================
function updateUI() {
  const p = gameState.player;
  const realm = getRealm(p.level);
  
  // 同步境界索引
  if (p.realmIndex !== realm.index) {
    p.realmIndex = realm.index;
    updateRealmHint(realm);
  }
  
  document.getElementById('player-name').textContent = p.name;
  document.getElementById('player-realm').textContent = `${realm.name}境 Lv.${p.level}`;
  document.getElementById('hp-text').textContent = `${Math.floor(p.hp)}/${p.maxHp}`;
  document.getElementById('hp-bar').style.width = `${Math.max(0, Math.min(100, (p.hp / p.maxHp) * 100))}%`;
  document.getElementById('mp-text').textContent = `${Math.floor(p.mp)}/${p.maxMp}`;
  document.getElementById('mp-bar').style.width = `${Math.max(0, Math.min(100, (p.mp / p.maxMp) * 100))}%`;
  
  const expNeeded = expToLevel(p.level);
  document.getElementById('exp-text').textContent = `${p.exp}/${expNeeded}`;
  document.getElementById('exp-bar').style.width = `${Math.max(0, Math.min(100, (p.exp / expNeeded) * 100))}%`;
  
  let totalAtk = p.baseAtk, totalDef = p.baseDef, totalCrit = p.crit, totalDodge = p.dodge;
  for (const slot in p.equipment) {
    const eq = p.equipment[slot];
    if (eq) {
      totalAtk += eq.atk; totalDef += eq.def;
      for (const a of eq.affixes) {
        if (a.stat === 'atk') totalAtk += a.value;
        if (a.stat === 'def') totalDef += a.value;
        if (a.stat === 'crit') totalCrit += a.value;
        if (a.stat === 'dodge') totalDodge += a.value;
      }
    }
  }
  
  document.getElementById('stat-atk').textContent = totalAtk;
  document.getElementById('stat-def').textContent = totalDef;
  document.getElementById('stat-crit').textContent = totalCrit + '%';
  document.getElementById('stat-dodge').textContent = totalDodge + '%';
  document.getElementById('pos-text').textContent = `${Math.floor(p.x)}, ${Math.floor(p.y)}`;
  document.getElementById('gold-text').textContent = p.gold;
  document.getElementById('kills-text').textContent = p.kills;
  
  document.querySelectorAll('.equip-slot').forEach(slot => {
    const eq = p.equipment[slot.dataset.slot];
    slot.textContent = eq ? eq.icon : '·';
    slot.className = 'equip-slot' + (eq ? ' ' + QUALITIES[eq.quality].class : '');
  });
  
  const invGrid = document.getElementById('inventory-grid');
  invGrid.innerHTML = '';
  for (let i = 0; i < 20; i++) {
    const slot = document.createElement('div');
    slot.className = 'inv-slot';
    if (p.inventory[i]) {
      const item = p.inventory[i];
      slot.textContent = item.icon;
      if (item.quality !== undefined) slot.style.color = QUALITIES[item.quality].color;
      if (item.count > 1) {
        const cnt = document.createElement('span');
        cnt.className = 'item-count';
        cnt.textContent = item.count;
        slot.appendChild(cnt);
      }
      slot.title = item.name;
    }
    invGrid.appendChild(slot);
  }
  document.getElementById('inv-count').textContent = `(${p.inventory.filter(x => x).length}/20)`;
  
  document.querySelectorAll('.skill-slot').forEach((slot, i) => {
    const cd = p.skillCooldowns[i];
    if (cd > 0) {
      slot.classList.add('on-cooldown');
      let t = slot.querySelector('.cd-timer');
      if (!t) { t = document.createElement('span'); t.className = 'cd-timer'; slot.appendChild(t); }
      t.textContent = Math.ceil(cd / 1000);
    } else {
      slot.classList.remove('on-cooldown');
      const t = slot.querySelector('.cd-timer');
      if (t) t.textContent = '';
    }
  });
}

function updateRealmHint(realm) {
  const hint = document.getElementById('realm-hint');
  hint.textContent = realm.hint;
  hint.style.color = realm.particleColor;
  hint.style.borderColor = realm.particleColor;
  // 3秒后淡出
  hint.style.opacity = '1';
  clearTimeout(window._realmHintTimer);
  window._realmHintTimer = setTimeout(() => {
    hint.style.transition = 'opacity 1s';
    hint.style.opacity = '0';
  }, 3000);
}

function log(msg, type = '') {
  const logDiv = document.getElementById('combat-log');
  const entry = document.createElement('div');
  entry.className = 'log-item' + (type ? ' log-' + type : '');
  entry.textContent = msg;
  logDiv.appendChild(entry);
  logDiv.scrollTop = logDiv.scrollHeight;
  while (logDiv.children.length > 80) logDiv.removeChild(logDiv.firstChild);
}

// ==================== Canvas 渲染 ====================
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

// 明确设置Canvas尺寸
function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// 境界突破粒子效果
function spawnRealmParticles() {
  const p = gameState.player;
  const realm = getRealm(p.level);
  for (let i = 0; i < 50; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = rand(20, 120);
    gameState.realmParticles.push({
      x: p.x + Math.cos(angle) * dist,
      y: p.y + Math.sin(angle) * dist,
      vx: Math.cos(angle) * randFloat(1, 3),
      vy: Math.sin(angle) * randFloat(1, 3) - 2,
      color: Math.random() > 0.5 ? realm.particleColor : realm.particleColor2,
      life: rand(30, 60),
      maxLife: 60,
      size: rand(3, 8),
    });
  }
  gameState.realmFlash = 20;  // 白光闪烁帧数
}

function render() {
  const p = gameState.player;
  const realm = REALMS[p.realmIndex] || REALMS[0];
  
  // 背景渐变
  const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
  bg.addColorStop(0, realm.bgGradient[0]);
  bg.addColorStop(1, realm.bgGradient[1]);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // 境界突破白光闪烁
  if (gameState.realmFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${gameState.realmFlash / 40})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    gameState.realmFlash--;
  }
  
  // 境界粒子（环境氛围）
  if (Math.random() < 0.1) {
    gameState.particles.push({
      x: rand(0, canvas.width),
      y: canvas.height + 10,
      vx: randFloat(-0.3, 0.3),
      vy: randFloat(-0.5, -1.5),
      color: Math.random() > 0.5 ? realm.particleColor : realm.particleColor2,
      life: rand(100, 200),
      maxLife: 200,
      size: rand(1, 3),
      ambient: true,
    });
  }
  
  // 背景网格
  ctx.strokeStyle = 'rgba(48,54,61,0.5)';
  ctx.lineWidth = 1;
  const gridSize = 50;
  for (let x = 0; x < canvas.width; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }
  
  // 绘制怪物
  for (const mob of gameState.mobs) {
    const mobData = MONSTERS[mob.type];
    
    // 怪物发光
    ctx.shadowColor = mobData.color;
    ctx.shadowBlur = 8;
    ctx.font = '28px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(mob.icon, mob.x, mob.y + 8);
    ctx.shadowBlur = 0;
    
    // 血条背景
    ctx.fillStyle = '#21262d';
    ctx.fillRect(mob.x - 25, mob.y - 32, 50, 7);
    // 血条填充（根据HP百分比变色）
    const hpPercent = Math.max(0, mob.hp / mob.maxHp);
    const hpColor = hpPercent > 0.5 ? '#3fb950' : hpPercent > 0.25 ? '#d29922' : '#f85149';
    ctx.fillStyle = hpColor;
    ctx.fillRect(mob.x - 25, mob.y - 32, 50 * hpPercent, 7);
    // 血条高光
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(mob.x - 25, mob.y - 32, 50 * hpPercent, 3);
    // 血条边框
    ctx.strokeStyle = '#30363d';
    ctx.lineWidth = 1;
    ctx.strokeRect(mob.x - 25, mob.y - 32, 50, 7);
    
    // 血量文字
    ctx.font = '9px Arial';
    ctx.fillStyle = '#f0f6fc';
    ctx.fillText(`${Math.ceil(mob.hp)}/${mob.maxHp}`, mob.x, mob.y - 37);
    
    // 名字
    ctx.font = '10px Arial';
    ctx.fillStyle = mob.isBoss ? '#ffa500' : '#c9d1d9';
    ctx.fillText(mob.name, mob.x, mob.y - 42);
  }
  
  // 玩家光晕
  ctx.shadowColor = realm.playerGlow;
  ctx.shadowBlur = 15 + Math.sin(Date.now() / 500) * 5;
  
  // 攻击动画
  if (p.attackAnim > 0) {
    const progress = 1 - p.attackAnim / 10;
    const swingAngle = progress * Math.PI * 0.7;
    const swingDist = 55;
    
    ctx.strokeStyle = `rgba(255,165,87,${1 - progress * 0.5})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(p.x, p.y, swingDist, p.facing - swingAngle, p.facing + swingAngle);
    ctx.stroke();
    
    ctx.strokeStyle = `rgba(255,255,255,${0.6 - progress * 0.6})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(p.x, p.y, swingDist * 0.75, p.facing - swingAngle * 0.7, p.facing + swingAngle * 0.7);
    ctx.stroke();
    
    p.attackAnim--;
  }
  
  // 玩家本体
  ctx.font = '34px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(realm.playerIcon, p.x, p.y + 10);
  ctx.shadowBlur = 0;
  
  // 境界光环
  ctx.strokeStyle = realm.glowColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(p.x, p.y, 22, 0, Math.PI * 2);
  ctx.stroke();
  
  // 攻击范围（按住鼠标）
  if (gameState.mouse.down) {
    ctx.strokeStyle = 'rgba(88,166,255,0.3)';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.arc(p.x, p.y, CONFIG.ATTACK_RANGE, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  
  // 伤害数字
  for (const dmg of gameState.damageNumbers) {
    const alpha = dmg.life / 40;
    ctx.globalAlpha = alpha;
    ctx.font = dmg.crit ? 'bold 18px Arial' : '14px Arial';
    ctx.fillStyle = dmg.color;
    ctx.textAlign = 'center';
    ctx.fillText(dmg.text, dmg.x, dmg.y);
    dmg.y -= 1.2;
    dmg.life--;
  }
  ctx.globalAlpha = 1;
  gameState.damageNumbers = gameState.damageNumbers.filter(d => d.life > 0);
  
  // 粒子效果
  for (const particle of gameState.particles) {
    const alpha = particle.life / particle.maxLife;
    ctx.globalAlpha = alpha * (particle.ambient ? 0.4 : 1);
    ctx.fillStyle = particle.color;
    ctx.beginPath();
    ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
    ctx.fill();
    particle.x += particle.vx;
    particle.y += particle.vy;
    if (!particle.ambient) {
      particle.vy += 0.05; // 重力
    }
    particle.life--;
  }
  ctx.globalAlpha = 1;
  gameState.particles = gameState.particles.filter(p => p.life > 0);
  
  // 境界突破粒子
  for (const rp of gameState.realmParticles) {
    const alpha = rp.life / rp.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = rp.color;
    ctx.shadowColor = rp.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(rp.x, rp.y, rp.size * alpha, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    rp.x += rp.vx;
    rp.y += rp.vy;
    rp.vy += 0.05;
    rp.life--;
  }
  ctx.globalAlpha = 1;
  gameState.realmParticles = gameState.realmParticles.filter(r => r.life > 0);
}

// ==================== 游戏逻辑 ====================
function spawnMob() {
  if (gameState.mobs.length >= 8) return;
  const types = Object.keys(MONSTERS).filter(m => !MONSTERS[m].isBoss);
  const type = types[rand(0, types.length - 1)];
  const mobData = MONSTERS[type];
  
  let x, y, tries = 0;
  do {
    const angle = Math.random() * Math.PI * 2;
    const dist = rand(180, 340);
    x = gameState.player.x + Math.cos(angle) * dist;
    y = gameState.player.y + Math.sin(angle) * dist;
    tries++;
  } while ((x < 40 || x > canvas.width - 40 || y < 40 || y > canvas.height - 40) && tries < 20);
  if (tries >= 20) return;
  
  gameState.mobs.push({
    id: Date.now() + Math.random(), type, name: mobData.name, icon: mobData.icon,
    x, y, hp: mobData.hp, maxHp: mobData.hp, atk: mobData.atk, def: mobData.def,
    exp: mobData.exp, gold: mobData.gold, isBoss: mobData.isBoss || false,
    lastAttack: 0,
  });
}

function resolveCollisions() {
  const p = gameState.player;
  const minDist = CONFIG.COLLISION_RADIUS;
  
  // 怪物互相分开
  for (let i = 0; i < gameState.mobs.length; i++) {
    for (let j = i + 1; j < gameState.mobs.length; j++) {
      const m1 = gameState.mobs[i], m2 = gameState.mobs[j];
      const dist = distance(m1.x, m1.y, m2.x, m2.y);
      if (dist < minDist && dist > 0) {
        const ov = (minDist - dist) / 2;
        const angle = Math.atan2(m2.y - m1.y, m2.x - m1.x);
        m1.x -= Math.cos(angle) * ov;
        m1.y -= Math.sin(angle) * ov;
        m2.x += Math.cos(angle) * ov;
        m2.y += Math.sin(angle) * ov;
      }
    }
  }
  
  // 怪物和玩家分开
  for (const mob of gameState.mobs) {
    const dist = distance(mob.x, mob.y, p.x, p.y);
    if (dist < minDist && dist > 0) {
      const ov = minDist - dist;
      const angle = Math.atan2(mob.y - p.y, mob.x - p.x);
      mob.x += Math.cos(angle) * ov;
      mob.y += Math.sin(angle) * ov;
    }
  }
}

function update(dt) {
  if (gameState.paused) return;
  
  const p = gameState.player;
  
  let dx = 0, dy = 0;
  if (gameState.keys['w'] || gameState.keys['W'] || gameState.keys['ArrowUp']) dy -= 1;
  if (gameState.keys['s'] || gameState.keys['S'] || gameState.keys['ArrowDown']) dy += 1;
  if (gameState.keys['a'] || gameState.keys['A'] || gameState.keys['ArrowLeft']) dx -= 1;
  if (gameState.keys['d'] || gameState.keys['D'] || gameState.keys['ArrowRight']) dx += 1;
  
  if (dx !== 0 || dy !== 0) {
    const len = Math.sqrt(dx*dx + dy*dy);
    p.x += (dx / len) * CONFIG.PLAYER_SPEED;
    p.y += (dy / len) * CONFIG.PLAYER_SPEED;
    p.facing = Math.atan2(dy, dx);
    p.x = Math.max(25, Math.min(canvas.width - 25, p.x));
    p.y = Math.max(25, Math.min(canvas.height - 25, p.y));
  }
  
  for (let i = 0; i < p.skillCooldowns.length; i++) {
    if (p.skillCooldowns[i] > 0) p.skillCooldowns[i] -= dt;
  }
  
  p.mp = Math.min(p.maxMp, p.mp + 0.015 * dt / 16);
  
  for (const mob of gameState.mobs) {
    const dist = distance(mob.x, mob.y, p.x, p.y);
    if (dist < 170 && dist > CONFIG.COLLISION_RADIUS + 5) {
      const angle = Math.atan2(p.y - mob.y, p.x - mob.x);
      const speed = mob.isBoss ? 1.5 : 1.0;
      mob.x += Math.cos(angle) * speed;
      mob.y += Math.sin(angle) * speed;
      if (dist < CONFIG.COLLISION_RADIUS + 10 && Date.now() - mob.lastAttack > 1200) {
        mob.lastAttack = Date.now();
        if (Math.random() * 100 < p.dodge) {
          log(`闪避了 ${mob.name}!`);
          gameState.damageNumbers.push({ text: '闪避', x: p.x, y: p.y - 25, color: '#3fb950', life: 35, crit: false });
        } else {
          const dmg = Math.max(1, mob.atk - p.baseDef);
          p.hp -= dmg;
          log(`${mob.name} 攻击 -${dmg}`, 'damage');
          gameState.damageNumbers.push({ text: '-' + dmg, x: p.x, y: p.y - 25, color: '#f85149', life: 35, crit: false });
          if (p.hp <= 0) {
            log('死亡! 复活...', 'damage');
            p.hp = p.maxHp; p.mp = p.maxMp;
            p.gold = Math.floor(p.gold * 0.9);
          }
        }
      }
    } else if (dist >= 170) {
      if (Math.random() < 0.015) {
        mob._tx = mob.x + rand(-50, 50);
        mob._ty = mob.y + rand(-50, 50);
      }
      if (mob._tx !== undefined) {
        const angle = Math.atan2(mob._ty - mob.y, mob._tx - mob.x);
        mob.x += Math.cos(angle) * 0.4;
        mob.y += Math.sin(angle) * 0.4;
      }
    }
  }
  
  resolveCollisions();
  
  if (gameState.mouse.down && Date.now() - gameState.lastAttackTime > CONFIG.ATTACK_COOLDOWN) {
    p.facing = Math.atan2(gameState.mouse.y - p.y, gameState.mouse.x - p.x);
    
    let nearestMob = null, nearestDist = CONFIG.ATTACK_RANGE + 30;
    for (const mob of gameState.mobs) {
      const dist = distance(mob.x, mob.y, p.x, p.y);
      const mDist = distance(mob.x, mob.y, gameState.mouse.x, gameState.mouse.y);
      if (dist < CONFIG.ATTACK_RANGE + 15 && mDist < nearestDist) {
        nearestMob = mob; nearestDist = mDist;
      }
    }
    
    if (nearestMob) {
      gameState.lastAttackTime = Date.now();
      p.attackAnim = 10;
      
      const isCrit = Math.random() * 100 < p.crit;
      let dmg = Math.max(1, p.baseAtk - nearestMob.def);
      if (isCrit) dmg = Math.floor(dmg * 1.5);
      
      nearestMob.hp -= dmg;
      log(`→ ${nearestMob.name} -${dmg}${isCrit ? ' 暴击!' : ''}`, isCrit ? 'damage' : '');
      gameState.damageNumbers.push({ text: (isCrit ? '暴击 ' : '') + dmg, x: nearestMob.x, y: nearestMob.y - 25, color: isCrit ? '#ffd700' : '#ffa657', life: 35, crit: isCrit });
      
      for (let i = 0; i < 6; i++) {
        gameState.particles.push({
          x: nearestMob.x + rand(-10, 10), y: nearestMob.y + rand(-10, 10),
          vx: randFloat(-2, 2), vy: randFloat(-3, -1),
          color: isCrit ? '#ffd700' : '#ffa657', size: rand(2, 5), life: 20, maxLife: 20,
        });
      }
      
      if (nearestMob.hp <= 0) {
        log(`击杀 ${nearestMob.name}!`, 'exp');
        p.exp += nearestMob.exp; p.gold += nearestMob.gold; p.kills++;
        
        const drops = processDrop(nearestMob, nearestMob.type);
        if (drops.length) showDropModal(drops);
        
        // 检查境界突破
        checkRealmUp();
        
        while (p.exp >= expToLevel(p.level)) {
          p.exp -= expToLevel(p.level);
          p.level++;
          p.maxHp += 20; p.hp = Math.min(p.hp + 20, p.maxHp);
          p.maxMp += 10; p.mp = Math.min(p.mp + 10, p.maxMp);
          p.baseAtk += 2; p.baseDef += 1;
          log(`⬆️ Lv.${p.level}!`, 'level');
        }
        
        gameState.mobs = gameState.mobs.filter(m => m.id !== nearestMob.id);
      }
    }
  }
  
  updateUI();
}

// 境界突破检测
function checkRealmUp() {
  const oldRealm = getRealm(gameState.player.level);
  const newRealm = REALMS[gameState.player.realmIndex];
  
  if (oldRealm.name !== newRealm.name) {
    // 境界变化了！
    gameState.player.realmIndex = oldRealm.index;
    
    // 触发突破特效
    spawnRealmParticles();
    
    // 显示境界突破弹窗
    const modal = document.getElementById('realm-modal');
    document.getElementById('realm-modal-name').textContent = newRealm.name + '境';
    document.getElementById('realm-modal-desc').textContent = newRealm.hint;
    document.getElementById('realm-modal-reward').textContent = 
      `攻击+${newRealm.atkBonus} 防御+${newRealm.defBonus} 生命+${newRealm.hpBonus} 法力+${newRealm.mpBonus}`;
    modal.classList.add('show');
    gameState.paused = true;
    
    log(`🌟 境界突破! 踏入${newRealm.name}境!`, 'realm');
  }
}

function closeRealmModal() {
  document.getElementById('realm-modal').classList.remove('show');
  gameState.paused = false;
}

// ==================== 掉落弹窗 ====================
let pendingDrops = [];

function showDropModal(drops) {
  pendingDrops = pendingDrops.concat(drops);
  const modal = document.getElementById('drop-modal');
  const itemsDiv = document.getElementById('drop-items');
  itemsDiv.innerHTML = '';
  for (const drop of drops) {
    const div = document.createElement('div');
    div.className = 'drop-item';
    if (drop.type === 'gold') div.innerHTML = `<span style="color:#ffa657">💰 ${drop.amount} 金币</span>`;
    else if (drop.type === 'item') div.innerHTML = `${drop.icon} ${drop.name}`;
    else if (drop.quality !== undefined) div.innerHTML = `<span style="color:${QUALITIES[drop.quality].color}">${drop.icon} ${QUALITIES[drop.quality].name} ${drop.name}</span>`;
    itemsDiv.appendChild(div);
  }
  modal.classList.add('show');
}

function closeDropModal() {
  document.getElementById('drop-modal').classList.remove('show');
  for (const drop of pendingDrops) {
    if (drop.type === 'gold') gameState.player.gold += drop.amount;
    else addToInventory(drop);
  }
  pendingDrops = [];
  updateUI();
}

function addToInventory(item) {
  if (item.stackable) {
    const ex = gameState.player.inventory.find(i => i && i.id === item.id);
    if (ex) { ex.count++; return true; }
  }
  const idx = gameState.player.inventory.findIndex(i => !i);
  if (idx !== -1) { gameState.player.inventory[idx] = { ...item, count: 1 }; return true; }
  log('背包满!', 'damage');
  return false;
}

// ==================== 技能 ====================
function useSkill(index) {
  const p = gameState.player;
  if (p.skillCooldowns[index] > 0) { log('冷却中...'); return; }
  
  const skills = [
    { name: '剑气', mp: 10, cd: 3000, damage: 30, range: 150 },
    { name: '雷法', mp: 20, cd: 5000, damage: 60, range: 180, aoe: true },
    { name: '护盾', mp: 15, cd: 8000, heal: 50 },
    { name: '瞬移', mp: 25, cd: 6000, teleport: true },
  ];
  
  const sk = skills[index];
  if (p.mp < sk.mp) { log('法力不足'); return; }
  p.mp -= sk.mp;
  p.skillCooldowns[index] = sk.cd;
  p.attackAnim = 8;
  
  if (sk.damage) {
    for (const mob of gameState.mobs) {
      if (distance(mob.x, mob.y, p.x, p.y) < sk.range) {
        const dmg = sk.damage + p.baseAtk;
        mob.hp -= dmg;
        log(`${sk.name} → ${mob.name} -${dmg}`, 'damage');
        gameState.damageNumbers.push({ text: dmg, x: mob.x, y: mob.y - 25, color: '#a371f7', life: 35, crit: false });
        if (!sk.aoe) break;
      }
    }
  }
  
  if (sk.heal) {
    p.hp = Math.min(p.maxHp, p.hp + sk.heal);
    log(`${sk.name} +${sk.heal} HP`, 'heal');
    gameState.damageNumbers.push({ text: '+' + sk.heal, x: p.x, y: p.y - 25, color: '#3fb950', life: 35, crit: false });
  }
  
  if (sk.teleport) {
    if (distance(gameState.mouse.x, gameState.mouse.y, p.x, p.y) < 200) {
      p.x = gameState.mouse.x;
      p.y = gameState.mouse.y;
      log('瞬移!');
    } else { log('距离太远'); p.mp += sk.mp; p.skillCooldowns[index] = 0; }
  }
}

// ==================== 存档 ====================
function saveGame() {
  localStorage.setItem('xiantu_save', JSON.stringify(gameState));
  log('存档成功');
}

function loadGame() {
  const data = localStorage.getItem('xiantu_save');
  if (data) {
    gameState = JSON.parse(data);
    log('读档成功');
    updateUI();
  } else log('无存档');
}

// ==================== 事件 ====================
document.addEventListener('keydown', e => {
  gameState.keys[e.key] = true;
  if (e.key >= '1' && e.key <= '4') useSkill(parseInt(e.key) - 1);
});

document.addEventListener('keyup', e => { gameState.keys[e.key] = false; });

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  gameState.mouse.x = e.clientX - rect.left;
  gameState.mouse.y = e.clientY - rect.top;
});

canvas.addEventListener('mousedown', e => { gameState.mouse.down = true; });
canvas.addEventListener('mouseup', e => { gameState.mouse.down = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

document.getElementById('btn-pause').addEventListener('click', () => {
  gameState.paused = !gameState.paused;
  document.getElementById('btn-pause').textContent = gameState.paused ? '▶️' : '⏸️';
  log(gameState.paused ? '暂停' : '继续');
});

document.getElementById('btn-save').addEventListener('click', saveGame);
document.getElementById('btn-load').addEventListener('click', loadGame);

document.getElementById('inventory-grid').addEventListener('click', e => {
  if (!e.target.classList.contains('inv-slot')) return;
  const index = Array.from(e.target.parentElement.children).indexOf(e.target);
  const item = gameState.player.inventory[index];
  if (!item) return;
  
  if (item.effect) {
    if (item.effect.hp) gameState.player.hp = Math.min(gameState.player.maxHp, gameState.player.hp + item.effect.hp);
    if (item.effect.mp) gameState.player.mp = Math.min(gameState.player.maxMp, gameState.player.mp + item.effect.mp);
    log(`使用 ${item.name}`);
    item.count--;
    if (item.count <= 0) gameState.player.inventory[index] = null;
  } else if (item.type) {
    const old = gameState.player.equipment[item.type];
    gameState.player.equipment[item.type] = item;
    gameState.player.inventory[index] = old;
    log(`装备 ${item.name}`);
  }
  updateUI();
});

// ==================== 主循环 ====================
let lastTime = 0;
function gameLoop(timestamp) {
  const dt = Math.min(timestamp - lastTime, 50); // 限制最大dt防止跳帧
  lastTime = timestamp;
  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}

setInterval(spawnMob, 3500);

// 初始化
updateUI();
updateRealmHint(REALMS[0]);
log('欢迎来到仙途!');
log('WASD移动 | 鼠标攻击 | 1-4技能');
log('突破凡人境将开启全新视觉!');
requestAnimationFrame(gameLoop);
</script>
